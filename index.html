<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Smart Tools — convert, edit, organize, sign, and print documents, with built-in AI." />
<title>Smart Tools</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%234f5bd5'/%3E%3Cpath d='M32 12c1.6 10.4 6.4 18.4 24 20-17.6 1.6-22.4 9.6-24 20-1.6-10.4-6.4-18.4-24-20 17.6-1.6 22.4-9.6 24-20z' fill='%23fff'/%3E%3C/svg%3E" />
<style>
/* ==========================================================================
   Design tokens
   ========================================================================== */
:root {
  --font-sans: "Inter", "SF Pro Display", "Segoe UI", system-ui, Arial, sans-serif;

  --surface: #fafafa;
  --panel: #ffffff;
  --ink: #1f2328;
  --ink-secondary: #4b5158;
  --ink-muted: #737a82;
  --line: #e7e8ea;
  --line-strong: #d5d7da;
  --hover: #f1f2f3;

  --accent-red: #dc4a4a;
  --accent-orange: #e8712e;
  --accent-amber: #dfa321;
  --accent-green: #2f9e63;
  --accent-teal: #189a8c;
  --accent-sky: #2b9fd8;
  --accent-blue: #3272e0;
  --accent-indigo: #4f5bd5;
  --accent-purple: #7b52c7;
  --accent-pink: #cf4d9b;
  --accent-rose: #e0506e;
  --accent-cyan: #0e9bb5;

  --primary: #2f6bd8;
  --primary-hover: #2a5fc2;
  --danger: #c9403f;
  --success: #2f9e63;

  --stage: #eceef0;
  --selected: #f6f9ff;
  --warn-text: #8a6116;
  --warn-bg: #fdf7ec;
  --warn-border: #f0e2c4;
  --error-text: #9b3332;
  --error-bg: #fdf3f3;
  --error-border: #f2d8d8;
  --success-bg: #ecf7f1;
  --code-bg: #e7e9eb;
  --toast-bg: #24272b;

  color-scheme: light;

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;

  --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 16px rgb(0 0 0 / 0.08);
  --shadow-toast: 0 4px 16px rgb(0 0 0 / 0.16);

  --focus-ring: 0 0 0 2px var(--panel), 0 0 0 4px var(--primary);
}

/* Dark theme */
[data-theme="dark"] {
  --surface: #141619;
  --panel: #1d2023;
  --ink: #e7e9ec;
  --ink-secondary: #b6bbc2;
  --ink-muted: #878e96;
  --line: #2b2f34;
  --line-strong: #3d434a;
  --hover: #25292d;

  --stage: #0f1113;
  --selected: #202a3d;
  --warn-text: #d9a94c;
  --warn-bg: #2c2517;
  --warn-border: #4a3c1e;
  --error-text: #e58a8a;
  --error-bg: #321f1f;
  --error-border: #553030;
  --success-bg: #1c2f25;
  --code-bg: #2b2f34;
  --toast-bg: #33383e;

  --primary: #4d82e8;
  --primary-hover: #5c8eec;

  color-scheme: dark;

  --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 16px rgb(0 0 0 / 0.4);
}

/* ==========================================================================
   Base
   ========================================================================== */
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: var(--surface);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button, input, select, textarea { font: inherit; color: inherit; }

h1, h2, h3, p { margin: 0; }

a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

:is(button, a, input, select, textarea, [tabindex]):focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--radius-sm);
}

.app { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }
@media (min-width: 768px) { .app { padding-inline: 40px; } }

/* ==========================================================================
   Top bar / breadcrumb
   ========================================================================== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 28px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.brand:hover { text-decoration: none; }

.brand-mark {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
  color: #fff;
}
.brand-mark svg { width: 15px; height: 15px; }

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-muted);
}
.breadcrumb a { color: var(--ink-muted); }
.breadcrumb a:hover { color: var(--ink); text-decoration: none; }
.breadcrumb .sep { user-select: none; }
.breadcrumb .current { color: var(--ink); font-weight: 500; }

/* ==========================================================================
   Buttons
   ========================================================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px 16px;
  font-size: 13.5px;
  font-weight: 500;
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.55; cursor: not-allowed; }
.btn svg { width: 15px; height: 15px; }

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

.btn-secondary { background: var(--panel); border-color: var(--line-strong); color: var(--ink); }
.btn-secondary:hover:not(:disabled) { background: var(--hover); }

.btn-ghost { background: none; color: var(--ink-secondary); }
.btn-ghost:hover:not(:disabled) { background: var(--hover); color: var(--ink); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #b23837; }

.btn-lg { padding: 10px 20px; font-size: 14px; }
.btn-sm { padding: 5px 10px; font-size: 12.5px; border-radius: var(--radius-sm); }

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  padding: 0;
  background: none;
  border: 0;
  border-radius: var(--radius-sm);
  color: var(--ink-muted);
  cursor: pointer;
  transition: background-color 0.15s ease, color 0.15s ease;
}
.icon-btn:hover:not(:disabled) { background: var(--hover); color: var(--ink); }
.icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.icon-btn svg { width: 15px; height: 15px; }

/* ==========================================================================
   Home: directory
   ========================================================================== */
.home-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 28px;
}

.home-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.home-sub { margin-top: 2px; font-size: 13px; color: var(--ink-muted); }

.search { position: relative; }
.search svg {
  position: absolute;
  left: 12px;
  top: 50%;
  translate: 0 -50%;
  width: 14px;
  height: 14px;
  color: var(--ink-muted);
  pointer-events: none;
}
.search input {
  width: 208px;
  padding: 7px 12px 7px 34px;
  font-size: 13px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  transition: border-color 0.15s ease;
}
.search input::placeholder { color: var(--ink-muted); }
.search input:focus { border-color: var(--primary); outline: none; box-shadow: none; }
@media (min-width: 640px) { .search input { width: 240px; } }

.recent {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.recent-title { margin-bottom: 8px; font-size: 12px; font-weight: 500; color: var(--ink-muted); }
.recent-row { display: flex; flex-wrap: wrap; gap: 8px; }
.recent-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 6px 6px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: background-color 0.15s ease;
}
.recent-chip:hover { background: var(--hover); }

.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.filter-chip {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-secondary);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.filter-chip:hover { background: var(--hover); color: var(--ink); }
.filter-chip.is-active { background: var(--ink); border-color: var(--ink); color: var(--surface); }

.tools-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(236px, 1fr));
  gap: 12px;
}
.tool-card {
  display: flex;
  flex-direction: column;
  gap: 9px;
  padding: 14px 15px;
  text-align: left;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, translate 0.15s ease;
}
.tool-card:hover { border-color: var(--line-strong); box-shadow: var(--shadow-md); translate: 0 -1px; }
.tool-card[hidden] { display: none; }
.tool-card-head { display: flex; align-items: center; gap: 11px; min-width: 0; }
.tool-card .tool-name { font-size: 13.5px; font-weight: 600; }
.demo-badge {
  margin-left: auto;
  padding: 2px 7px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--warn-text);
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: 999px;
  flex-shrink: 0;
}
.tool-card-desc {
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.result-count { margin: -14px 0 14px; font-size: 12px; color: var(--ink-muted); }
.tools-sec { margin-bottom: 30px; }
.tools-sec[hidden] { display: none; }
.tools-sec-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.tools-sec-head h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--ink); }
.tools-sec-head .count { font-size: 12px; color: var(--ink-muted); }

.tool-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.tool-list li[hidden] { display: none; }

.tool-item {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 7px 10px;
  text-align: left;
  background: none;
  border: 0;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background-color 0.15s ease;
}
.tool-item:hover { background: var(--hover); }
.tool-name { font-size: 13.5px; font-weight: 500; }

.tool-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  border-radius: 8px;
  color: #fff;
}
.tool-icon svg { width: 15px; height: 15px; }
.tool-icon .badge { font-weight: 700; font-size: 11px; }
.tool-icon .badge-long { font-size: 6.5px; letter-spacing: 0.03em; }
.tool-icon-lg { width: 40px; height: 40px; border-radius: 10px; }
.tool-icon-lg svg { width: 19px; height: 19px; }
.tool-icon-lg .badge { font-size: 14px; }
.tool-icon-lg .badge-long { font-size: 8.5px; }

.empty-state {
  display: none;
  padding: 64px 0;
  text-align: center;
  font-size: 13.5px;
  color: var(--ink-muted);
}
.empty-state.is-visible { display: block; }

/* ==========================================================================
   Tool workspace
   ========================================================================== */
.ws-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 24px; }
.ws-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
.ws-desc { margin-top: 2px; font-size: 13.5px; color: var(--ink-muted); max-width: 560px; }

.ws-grid { display: grid; gap: 20px; align-items: start; }
@media (min-width: 900px) { .ws-grid { grid-template-columns: minmax(0, 1fr) 360px; } }

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.panel-body { padding: 20px; }
.panel-title {
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}

/* Upload */
.dropzone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 36px 20px;
  text-align: center;
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color 0.15s ease, background-color 0.15s ease;
}
.dropzone:hover, .dropzone.is-drag { border-color: var(--primary); background: var(--selected); }
.dropzone svg { width: 22px; height: 22px; color: var(--ink-muted); }
.dropzone-label { font-size: 13.5px; font-weight: 500; }
.dropzone-hint { font-size: 12.5px; color: var(--ink-muted); }
.dropzone input[type="file"] { display: none; }

.upload-error {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--error-text);
  background: var(--error-bg);
  border: 1px solid var(--error-border);
  border-radius: var(--radius-md);
}

/* File rows */
.file-rows { list-style: none; margin: 14px 0 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
.file-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  background: var(--panel);
}
.file-row-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  border-radius: 7px;
  background: var(--hover);
  color: var(--ink-secondary);
}
.file-row-icon svg { width: 14px; height: 14px; }
.file-row-meta { min-width: 0; flex: 1; }
.file-row-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-row-size { font-size: 12px; color: var(--ink-muted); }
.file-row-actions { display: flex; gap: 2px; }

/* Preview */
.preview-empty {
  padding: 40px 20px;
  text-align: center;
  font-size: 13px;
  color: var(--ink-muted);
}
.preview-stage {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--stage);
  border-radius: var(--radius-md);
  min-height: 220px;
  overflow: hidden;
}
.preview-page {
  position: relative;
  width: 170px;
  aspect-ratio: 8.5 / 11;
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.preview-page .lines { position: absolute; inset: 18px 16px; }
.preview-page .lines span {
  display: block;
  height: 5px;
  margin-bottom: 7px;
  border-radius: 2px;
  background: #e8eaec;
}
.preview-page .lines span:nth-child(1) { width: 55%; height: 8px; background: #d9dcdf; }
.preview-page .lines span:nth-child(4) { width: 80%; }
.preview-page .lines span:nth-child(7) { width: 60%; }
.preview-img { max-width: 100%; max-height: 260px; border-radius: 4px; box-shadow: var(--shadow-md); }
.preview-caption { margin-top: 10px; text-align: center; font-size: 12.5px; color: var(--ink-muted); }
.pages-pill {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 3px 9px;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--ink-secondary);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 999px;
  box-shadow: var(--shadow-sm);
}

/* Crop overlay */
.crop-box {
  position: absolute;
  border: 1.5px dashed var(--primary);
  background: rgb(47 107 216 / 0.06);
  pointer-events: none;
}

/* Redaction */
.redact-box { position: absolute; background: #16181a; border-radius: 1px; }

/* Signature overlay */
.sig-overlay {
  position: absolute;
  right: 10px;
  bottom: 10px;
  max-width: 45%;
  padding: 4px 8px;
  background: rgb(255 255 255 / 0.9);
  border: 1px dashed var(--line-strong);
  border-radius: 4px;
  font-family: "Snell Roundhand", "Segoe Script", cursive;
  font-size: 15px;
  color: #22314f;
}
.sig-overlay img { max-height: 28px; display: block; }

/* Options */
.opt { padding: 14px 20px; border-bottom: 1px solid var(--line); }
.opt:last-child { border-bottom: 0; }
.opt[hidden] { display: none; }
.opt-label { display: block; margin-bottom: 8px; font-size: 12.5px; font-weight: 600; color: var(--ink); }
.opt-note { margin-top: 6px; font-size: 12px; color: var(--ink-muted); }

.radio-list { display: flex; flex-direction: column; gap: 6px; }
.radio-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color 0.15s ease, background-color 0.15s ease;
}
.radio-item:hover { background: var(--hover); }
.radio-item.is-checked { border-color: var(--primary); background: var(--selected); }
.radio-item input { margin: 2px 0 0; accent-color: var(--primary); }
.radio-item .radio-title { font-size: 13px; font-weight: 500; }
.radio-item .radio-hint { font-size: 12px; color: var(--ink-muted); }

.check-item { display: flex; align-items: center; gap: 9px; padding: 5px 0; font-size: 13px; cursor: pointer; }
.check-item input { accent-color: var(--primary); width: 14px; height: 14px; }

.field-input, .field-select, .field-textarea {
  width: 100%;
  padding: 7px 10px;
  font-size: 13px;
  background: var(--panel);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-md);
  transition: border-color 0.15s ease;
}
.field-input:focus, .field-select:focus, .field-textarea:focus {
  border-color: var(--primary);
  outline: none;
  box-shadow: none;
}
.field-textarea { min-height: 110px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
.field-row { display: flex; gap: 10px; }
.field-row > * { flex: 1; }

.range-row { display: flex; align-items: center; gap: 12px; }
.range-row input[type="range"] { flex: 1; accent-color: var(--primary); }
.range-value { min-width: 40px; font-size: 12.5px; color: var(--ink-secondary); text-align: right; }

/* Segmented tabs (signature, html input) */
.seg {
  display: inline-flex;
  padding: 3px;
  background: var(--hover);
  border-radius: var(--radius-md);
  gap: 2px;
}
.seg button {
  padding: 5px 12px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-secondary);
  background: none;
  border: 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
}
.seg button.is-active { background: var(--panel); color: var(--ink); box-shadow: var(--shadow-sm); }

.sig-canvas {
  width: 100%;
  height: 130px;
  margin-top: 10px;
  background: #fff;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-md);
  touch-action: none;
  cursor: crosshair;
}

/* Toolbar simulation (edit / annotate) */
.sim-toolbar { display: flex; flex-wrap: wrap; gap: 6px; }
.sim-tool {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 6px 11px;
  font-size: 12.5px;
  font-weight: 500;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
}
.sim-tool svg { width: 13px; height: 13px; }
.sim-tool.is-active { border-color: var(--primary); color: var(--primary); background: var(--selected); }

/* Organize thumbnails */
.thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px; }
.thumb {
  position: relative;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  background: #fff;
  padding: 8px 8px 6px;
  text-align: center;
}
.thumb.is-deleted { opacity: 0.35; }

const $ = (sel, root) => (root || document).querySelector(sel);
const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function formatSize(bytes) {
  if (!bytes && bytes !== 0) return "—";
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

function toolIconHtml(tool, large) {
  const cls = "tool-icon" + (large ? " tool-icon-lg" : "");
  const inner = tool.badge
    ? '<span class="badge' + (tool.badge.length > 2 ? " badge-long" : "") + '">' + esc(tool.badge) + "</span>"
    : svgIcon(tool.icon);
  return '<span class="' + cls + '" style="background:var(--accent-' + tool.accent + ')" aria-hidden="true">' + inner + "</span>";
}

/* Minimal valid single-page PDF used for prototype downloads */
function makePdfBlob(title, lines) {
  const content = ["BT /F1 16 Tf 72 730 Td (" + title.replace(/[()\\]/g, "") + ") Tj ET"];
  (lines || []).forEach((line, i) => {
    content.push("BT /F1 10 Tf 72 " + (700 - i * 16) + " Td (" + String(line).replace(/[()\\]/g, "") + ") Tj ET");
  });
  const stream = content.join("\n");
  const objects = [
    "<</Type/Catalog/Pages 2 0 R>>",
    "<</Type/Pages/Kids[3 0 R]/Count 1>>",
    "<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Contents 4 0 R/Resources<</Font<</F1 5 0 R>>>>>>",
    "<</Length " + stream.length + ">>\nstream\n" + stream + "\nendstream",
    "<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>",
  ];
  let pdf = "%PDF-1.4\n";
  const offsets = [];
  objects.forEach((obj, i) => {
    offsets.push(pdf.length);
    pdf += (i + 1) + " 0 obj\n" + obj + "\nendobj\n";
  });
  const xrefPos = pdf.length;
  pdf += "xref\n0 " + (objects.length + 1) + "\n0000000000 65535 f \n";
  offsets.forEach((off) => { pdf += String(off).padStart(10, "0") + " 00000 n \n"; });
  pdf += "trailer\n<</Size " + (objects.length + 1) + "/Root 1 0 R>>\nstartxref\n" + xrefPos + "\n%%EOF";
  return new Blob([pdf], { type: "application/pdf" });
}

  pdf: "application/pdf",
  docx: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
  xlsx: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",

};

function makeOutputBlob(tool) {
  const ext = tool.output.ext;
  if (ext === "pdf") {
    return makePdfBlob(tool.name + " — output", [
      "Generated by Smart Tools (prototype)",
      "Tool: " + tool.name,
      "Date: " + new Date().toLocaleString(),
      "",
      "This is a simulated output file produced by the frontend prototype.",
    ]);
  }
  const body = "Smart Tools prototype output\nTool: " + tool.name + "\nGenerated: " + new Date().toISOString() + "\n\nThis file simulates the real output (" + ext + ") of this tool.";
  return new Blob([body], { type: OUTPUT_MIME[ext] || "application/octet-stream" });
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

/* Real PDF page rendering via pdf.js (lazy-loaded from CDN, graceful fallback) */
let pdfjsPromise = null;
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (pdfjsPromise) return pdfjsPromise;
  pdfjsPromise = new Promise((resolve, reject) => {
    const fail = () => { pdfjsPromise = null; reject(new Error("pdf.js unavailable")); };
    const bail = setTimeout(fail, 20000);
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      clearTimeout(bail);
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      resolve(window.pdfjsLib);
    };
    s.onerror = () => { clearTimeout(bail); fail(); };
    document.head.appendChild(s);
  });
  return pdfjsPromise;
}

async function renderPdfThumb(entry) {
  try {
    const lib = await loadPdfJs();
    const buf = await entry.file.arrayBuffer();
    const doc = await lib.getDocument({ data: buf }).promise;
    entry.pages = doc.numPages;
    const page = await doc.getPage(1);
    const vp = page.getViewport({ scale: 1 });
    const scale = Math.min(2, 320 / vp.width);
    const v2 = page.getViewport({ scale });
    const canvas = document.createElement("canvas");
    canvas.width = Math.ceil(v2.width);
    canvas.height = Math.ceil(v2.height);
    await page.render({ canvasContext: canvas.getContext("2d"), viewport: v2 }).promise;
    entry.thumb = canvas.toDataURL("image/png");
    doc.destroy();
    return true;
  } catch {
    return false; /* offline or corrupt file — dummy thumbnail is used instead */
  }
}

/* Count pages in a real PDF file (rough fallback when pdf.js is unavailable) */
function countPdfPages(file) {
  return file.arrayBuffer().then((buf) => {
    const text = new TextDecoder("latin1").decode(buf);
    const matches = text.match(/\/Type\s*\/Page[^s]/g);
    return matches ? matches.length : null;
  }).catch(() => null);
}

/* ==========================================================================
   Toasts
   ========================================================================== */
function toast(message, kind) {
  const stack = $("#toast-stack");
  const el = document.createElement("div");
  el.className = "toast" + (kind === "error" ? " is-error" : "");
  el.innerHTML = svgIcon(kind === "error" ? "alert" : "check") + "<span>" + esc(message) + "</span>";
  stack.appendChild(el);
  requestAnimationFrame(() => el.classList.add("is-visible"));
  setTimeout(() => {
    el.classList.remove("is-visible");
    setTimeout(() => el.remove(), 250);
  }, 2600);
}

      '<div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">' +
      '<h3 class="modal-title" id="modal-title">' + esc(opts.title) + "</h3>" +
      '<p class="modal-body">' + esc(opts.body) + "</p>" +
      '<div class="modal-actions">' +
      '<button type="button" class="btn btn-secondary" data-act="cancel">Cancel</button>' +
      '<button type="button" class="btn ' + (opts.danger ? "btn-danger" : "btn-primary") + '" data-act="ok">' + esc(opts.okLabel || "Continue") + "</button>" +
      "</div></div></div>";

    const overlay = $(".modal-overlay", root);
    const done = (val) => {
      root.innerHTML = "";
      document.removeEventListener("keydown", onKey);
      modalCleanup = null;
      resolve(val);
    };
    modalCleanup = () => done(false);
    const onKey = (e) => { if (e.key === "Escape") done(false); };
    document.addEventListener("keydown", onKey);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) done(false); });
    $('[data-act="cancel"]', root).addEventListener("click", () => done(false));
    $('[data-act="ok"]', root).addEventListener("click", () => done(true));
    $('[data-act="ok"]', root).focus();
  });
}

/* ==========================================================================
   Theme (light / dark)
   ========================================================================== */
let memTheme = null;

function savedTheme() {
  try { return localStorage.getItem("pdftools.theme") || memTheme; }
  catch { return memTheme; }
}
function currentTheme() {
  return savedTheme() ||
    (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
}
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  $$(".theme-toggle").forEach((b) => {
    b.innerHTML = svgIcon(theme === "dark" ? "sun" : "moon");
    b.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
  });
}
function toggleTheme() {
  const next = currentTheme() === "dark" ? "light" : "dark";
  try { localStorage.setItem("pdftools.theme", next); }
  catch { memTheme = next; }
  applyTheme(next);
}
function themeToggleHtml() {
  const dark = currentTheme() === "dark";
  return '<button type="button" class="icon-btn theme-toggle" aria-label="' +
    (dark ? "Switch to light mode" : "Switch to dark mode") + '">' +
    svgIcon(dark ? "sun" : "moon") + "</button>";
}

/* ==========================================================================
   Recent tools
   ========================================================================== */
let memRecent = null; /* in-memory fallback when localStorage is unavailable */

function getRecent() {
  let list;
  try { list = JSON.parse(localStorage.getItem("pdftools.recent") || "[]"); }
  catch { list = memRecent || []; }
  return list.filter((id) => toolById[id]);
}
function pushRecent(id) {
  const list = [id].concat(getRecent().filter((x) => x !== id)).slice(0, 5);
  try { localStorage.setItem("pdftools.recent", JSON.stringify(list)); }
  catch { memRecent = list; }
}

/* ==========================================================================
   Router
   ========================================================================== */
const root = $("#root");

function route() {
  if (modalCleanup) modalCleanup();
  const hash = location.hash || "#/";
  const match = hash.match(/^#\/tools\/([a-z0-9-]+)/);
  if (match && toolById[match[1]]) {
    renderTool(toolById[match[1]]);
  } else if (/^#\/faq/.test(hash)) {
    renderFaq();
  } else {
    renderHome();
  }
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", route);

/* ---------------------------------------------------------------- files */
function acceptLabel(tool) {
  return tool.accept.join(", ").toUpperCase().replace(/\./g, "");
}

function renderFilesArea() {
  const area = $("#files-area");
  if (!area) return;
  const tool = state.tool;
  const busy = state.phase === "processing";

  if (tool.extra === "htmlinput") {
    area.innerHTML =
      '<div class="seg" role="tablist">' +
      '<button type="button" role="tab" data-mode="url" class="' + (state.ex.htmlMode === "url" ? "is-active" : "") + '" aria-selected="' + (state.ex.htmlMode === "url") + '">Web page URL</button>' +
      '<button type="button" role="tab" data-mode="html" class="' + (state.ex.htmlMode === "html" ? "is-active" : "") + '" aria-selected="' + (state.ex.htmlMode === "html") + '">HTML code</button>' +
      "</div>" +
      (state.ex.htmlMode === "url"
        ? '<div style="margin-top:12px"><input id="html-url" class="field-input" type="url" placeholder="https://example.com/page" value="' + esc(state.ex.url) + '" aria-label="Web page URL" /></div>'
        : '<div style="margin-top:12px"><textarea id="html-code" class="field-textarea" placeholder="&lt;html&gt;…&lt;/html&gt;" aria-label="HTML code">' + esc(state.ex.html) + "</textarea></div>");
    $$("[data-mode]", area).forEach((b) => b.addEventListener("click", () => {
      state.ex.htmlMode = b.dataset.mode; renderFilesArea(); renderPreview();
    }));
    const url = $("#html-url", area), code = $("#html-code", area);
    if (url) url.addEventListener("input", () => { state.ex.url = url.value; });
    if (code) code.addEventListener("input", () => { state.ex.html = code.value; });
    return;
  }

  let html = "";
  const showZone = tool.multiple
    ? !tool.maxFiles || state.files.length < tool.maxFiles
    : state.files.length === 0;
  if (showZone) {
    const hint = tool.printCard
      ? acceptLabel(tool) + " · upload front (and back) side"
      : acceptLabel(tool) + (tool.multiple ? " · multiple files supported" : "");
    html +=
      '<div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload file. Drag and drop or press Enter to browse.">' +
      svgIcon("upload") +
      '<span class="dropzone-label">Drag &amp; drop ' + (tool.multiple ? "files" : "a file") + " here, or <a>browse</a></span>" +
      '<span class="dropzone-hint">' + hint + "</span>" +
      '<input type="file" id="file-input" accept="' + tool.accept.join(",") + '"' + (tool.multiple ? " multiple" : "") + " /></div>";
  }
  if (tool.extra === "camera") {
    html += '<div style="margin-top:10px"><button type="button" class="btn btn-secondary btn-sm" id="camera-btn">' + svgIcon("camera") + "Use camera</button></div>";
  }
  if (tool.extra === "textinput") {
    html += '<div style="margin-top:14px"><label class="opt-label" for="paste-text">Or paste text</label>' +
      '<textarea id="paste-text" class="field-textarea" placeholder="Paste or type your text here…">' + esc(state.ex.pastedText) + "</textarea></div>";
  }
  if (state.uploadError) {
    html += '<div class="upload-error" role="alert">' + svgIcon("alert") + "<span>" + esc(state.uploadError) + "</span></div>";
  }
  if (state.files.length) {
    const sideLabels = tool.printCard
      ? (state.opts.doubleSided ? ["Front side · ", "Back side · "] : [])
      : (tool.sideLabels || []);
    html += '<ul class="file-rows">' + state.files.map((f, i) =>
      "<li class=\"file-row\">" +
      '<span class="file-row-icon">' + svgIcon("file") + "</span>" +
      '<span class="file-row-meta"><span class="file-row-name">' + esc(f.name) + '</span><span class="file-row-size">' + (sideLabels[i] || "") + formatSize(f.size) + (f.pages ? " · " + f.pages + " pages" : "") + (f.iw ? " · " + f.iw + "×" + f.ih + " px" : "") + "</span></span>" +
      '<span class="file-row-actions">' +
      (state.tool.reorder && state.files.length > 1
        ? '<button type="button" class="icon-btn" data-move="up" data-i="' + i + '" aria-label="Move up"' + (i === 0 || busy ? " disabled" : "") + ">" + svgIcon("up") + "</button>" +
          '<button type="button" class="icon-btn" data-move="down" data-i="' + i + '" aria-label="Move down"' + (i === state.files.length - 1 || busy ? " disabled" : "") + ">" + svgIcon("down") + "</button>"
        : "") +
      '<button type="button" class="icon-btn" data-remove="' + i + '" aria-label="Remove ' + esc(f.name) + '"' + (busy ? " disabled" : "") + ">" + svgIcon("x") + "</button>" +
      "</span></li>"
    ).join("") + "</ul>";
  }
  area.innerHTML = html;

  const zone = $("#dropzone", area);
  const input = $("#file-input", area);
  if (zone && input) {
    zone.addEventListener("click", (e) => { if (e.target !== input) input.click(); });
    zone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); input.click(); }
    });
    ["dragover", "dragenter"].forEach((ev) => zone.addEventListener(ev, (e) => { e.preventDefault(); zone.classList.add("is-drag"); }));
    ["dragleave", "drop"].forEach((ev) => zone.addEventListener(ev, (e) => { e.preventDefault(); zone.classList.remove("is-drag"); }));
    zone.addEventListener("drop", (e) => addFiles(e.dataTransfer.files));
    input.addEventListener("change", () => { addFiles(input.files); input.value = ""; });
  }
  $$("[data-remove]", area).forEach((b) => b.addEventListener("click", () => removeFile(+b.dataset.remove)));
  $$("[data-move]", area).forEach((b) => b.addEventListener("click", () => moveFile(+b.dataset.i, b.dataset.move === "up" ? -1 : 1)));
  const cam = $("#camera-btn", area);
  if (cam) cam.addEventListener("click", openCameraModal);
  const paste = $("#paste-text", area);
  if (paste) paste.addEventListener("input", () => { state.ex.pastedText = paste.value; });
}

function extOf(name) {
  const m = name.toLowerCase().match(/\.[a-z0-9]+$/);
  return m ? m[0] : "";
}

function addFiles(fileList) {
  const tool = state.tool;
  const incoming = Array.from(fileList || []);
  if (!incoming.length) return;
  state.uploadError = "";
  const rejected = [];
  let added = 0;

  for (const file of incoming) {
    const ext = extOf(file.name);
    if (!tool.accept.includes(ext)) { rejected.push(file.name); continue; }
    if (!tool.multiple && state.files.length + added >= 1) break;
    if (tool.multiple && tool.maxFiles && state.files.length + added >= tool.maxFiles) break;
    const entry = { file, name: file.name, size: file.size, ext, url: null, pages: null };
    if ([".jpg", ".jpeg", ".png", ".webp"].includes(ext)) {
      entry.url = URL.createObjectURL(file);
      loadImg(entry.url).then((im) => {
        if (state && state.files.includes(entry)) {
          entry.iw = im.naturalWidth; entry.ih = im.naturalHeight;
          renderFilesArea();
        }
      }).catch(() => {});
    }
    state.files.push(entry);
    added++;
    if (ext === ".pdf") {
      countPdfPages(file).then((n) => {
        if (n && !entry.pages && state && state.files.includes(entry)) {
          entry.pages = n;
          if (state.tool.extra === "organize") initOrganizePages();
          renderFilesArea(); renderPreview();
        }
      });
      renderPdfThumb(entry).then((ok) => {
        if (ok && state && state.files.includes(entry)) {
          if (state.tool.extra === "organize") initOrganizePages();
          renderFilesArea(); renderPreview();
        }
      });
    }
  }
  if (rejected.length) {
    state.uploadError = "Unsupported file type: " + rejected.join(", ") + ". Accepted: " + acceptLabel(tool) + ".";
    toast("Some files were rejected", "error");
  }
  if (added) {
    toast(added > 1 ? added + " files uploaded" : "File uploaded");
    if (state.tool.extra === "organize") initOrganizePages();
    if (state.phase === "done") { state.phase = "idle"; state.result = null; renderRightPanel(); }
  }
  renderFilesArea(); renderPreview();
  if (state.phase === "idle") renderRightPanel();
}

function removeFile(i) {
  const f = state.files[i];
  if (!f) return;
  if (f.url) URL.revokeObjectURL(f.url);
  state.files.splice(i, 1);
  state.uploadError = "";
  if (state.tool.extra === "organize") { state.ex.pages = null; if (state.files.length) initOrganizePages(); }
  if (state.tool.extra === "bgerase") { state.ex.bgCanvas = null; state.ex.bgImg = null; }
  if (state.tool.extra === "cropimg") state.ex.crop = null;
  toast("File removed");
  renderFilesArea(); renderPreview();
  if (state.phase === "idle") renderRightPanel();
}

function moveFile(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= state.files.length) return;
  [state.files[i], state.files[j]] = [state.files[j], state.files[i]];
  renderFilesArea(); renderPreview();
}

/* ---------------------------------------------------------------- camera capture */
let cameraStream = null;

async function openCameraModal() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast("Camera needs a secure (https) connection and a supported browser.", "error");
    return;
  }
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 2048 } },
      audio: false,
    });
  } catch {
    toast("Could not access the camera — check the browser permission.", "error");
    return;
  }

  const root = $("#modal-root");
  root.innerHTML =
    '<div class="modal-overlay" role="presentation">' +
    '<div class="modal" role="dialog" aria-modal="true" aria-label="Camera" style="max-width:560px">' +
    '<h3 class="modal-title">Scan with camera</h3>' +
    '<video id="cam-video" autoplay playsinline muted style="width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;background:#111"></video>' +
    '<div class="modal-actions" style="margin-top:14px;justify-content:space-between">' +
    '<span id="cam-count" style="font-size:12.5px;color:var(--ink-muted);align-self:center"></span>' +
    '<span style="display:flex;gap:10px">' +
    '<button type="button" class="btn btn-secondary" id="cam-done">Done</button>' +
    '<button type="button" class="btn btn-primary" id="cam-shot">' + svgIcon("camera") + "Capture</button>" +
    "</span></div></div></div>";

  const video = $("#cam-video", root);
  video.srcObject = cameraStream;

  const close = () => {
    if (cameraStream) { cameraStream.getTracks().forEach((t) => t.stop()); cameraStream = null; }
    root.innerHTML = "";
    document.removeEventListener("keydown", onKey);
    modalCleanup = null;
  };
  const onKey = (e) => { if (e.key === "Escape") close(); };
  modalCleanup = close;
  document.addEventListener("keydown", onKey);

  const overlay = $(".modal-overlay", root);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  $("#cam-done", root).addEventListener("click", close);

  let shots = 0;
  $("#cam-shot", root).addEventListener("click", () => {
    const c = document.createElement("canvas");
    c.width = video.videoWidth || 1280;
    c.height = video.videoHeight || 960;
    c.getContext("2d").drawImage(video, 0, 0, c.width, c.height);
    c.toBlob((blob) => {
      if (!blob) { toast("Could not capture the photo.", "error"); return; }
      shots++;
      addFiles([new File([blob], "scan-" + String(Date.now()).slice(-6) + ".jpg", { type: "image/jpeg" })]);
      const count = $("#cam-count");
      if (count) count.textContent = shots + " photo" + (shots > 1 ? "s" : "") + " added";
    }, "image/jpeg", 0.92);
  });
}

function initOrganizePages() {
  const count = (state.files[0] && state.files[0].pages) || 8;
  state.ex.pages = Array.from({ length: Math.min(count, 24) }, (_, i) => ({ n: i + 1, deleted: false }));
}

/* ---------------------------------------------------------------- preview */
async function detectFormFields(entry) {
  const P = await loadPdfLib();
  const doc = await loadPdfDoc(P, entry);
  let fields = [];
  try {
    fields = doc.getForm().getFields().slice(0, 50).map((f) => {
      const kind = f instanceof P.PDFTextField ? "text"
        : f instanceof P.PDFCheckBox ? "check"
        : f instanceof P.PDFDropdown ? "select"
        : f instanceof P.PDFRadioGroup ? "radio" : "other";
      let options = null;
      try { if (kind === "select" || kind === "radio") options = f.getOptions(); } catch { /* noop */ }
      return { name: f.getName(), kind, options };
    }).filter((f) => f.kind !== "other");
  } catch { /* no form */ }
  return fields;
}

function dummyPageHtml(scale) {
  return '<div class="preview-page"' + (scale ? ' style="scale:' + scale / 100 + '"' : "") + '><div class="lines">' +
    "<span></span>".repeat(9) + "</div></div>";
}

function renderPreview() {
  const area = $("#preview-area");
  if (!area) return;
  const tool = state.tool;
  const f = state.files[0];

  if (tool.extra === "print") { renderPrintPreview(area); return; }
  if (tool.extra === "merge") { renderMergePreview(area); return; }
  if (tool.extra === "cropimg") { renderCropPreview(area); return; }
  if (tool.extra === "imgedit") { renderEditorPreview(area); return; }
  if (tool.extra === "bgerase") { renderBgErasePreview(area); return; }

  /* Special previews without files */
  if (tool.extra === "htmlinput") {
    const src = state.ex.htmlMode === "url" ? state.ex.url : state.ex.html;
    area.innerHTML = src.trim()
      ? '<div class="preview-stage">' + dummyPageHtml() + "</div>" +
        '<p class="preview-caption">' + (state.ex.htmlMode === "url" ? esc(src.trim()) : "Pasted HTML — " + src.length + " characters") + "</p>"
      : '<p class="preview-empty">Enter a URL or paste HTML to see a preview.</p>';
    return;
  }

  if (!f && !(tool.extra === "textinput" && state.ex.pastedText.trim())) {
    area.innerHTML = '<p class="preview-empty">' + (tool.accept.length ? "Upload a file to see the preview here." : "Nothing to preview yet.") + "</p>";
    return;
  }

  let stageInner = "";
  let caption = "";

  if (!f && tool.extra === "textinput") {
    stageInner = dummyPageHtml();
    caption = "Pasted text — " + state.ex.pastedText.trim().length + " characters";
  } else if (f.url) {
    stageInner = '<img class="preview-img" src="' + f.url + '" alt="Preview of ' + esc(f.name) + '" />';
    caption = esc(f.name) + " · " + formatSize(f.size);
  } else if (f.ext === ".pdf") {
    stageInner = (f.thumb
      ? '<img class="preview-img" src="' + f.thumb + '" alt="First page of ' + esc(f.name) + '" style="scale:' + state.ex.zoom / 100 + '" />'
      : dummyPageHtml(state.ex.zoom)) +
      (f.pages ? '<span class="pages-pill">' + f.pages + " pages</span>" : "");
    caption = esc(f.name) + " · " + formatSize(f.size) + " · first page preview";
  } else {
    stageInner =
      '<div style="text-align:center">' +
      '<span class="file-row-icon" style="width:52px;height:52px;margin:0 auto;border-radius:12px">' + svgIcon("file") + "</span>" +
      '<p style="margin-top:10px;font-size:13px;font-weight:500">' + esc(f.ext.slice(1).toUpperCase()) + " document</p></div>";
    caption = esc(f.name) + " · " + formatSize(f.size);
  }

  let overlays = "";
  if (tool.extra === "crop") overlays = cropOverlayHtml();
  if (tool.extra === "redact") overlays = state.ex.redactBoxes.map((b) =>
    '<div class="redact-box" style="left:' + b.x + "%;top:" + b.y + "%;width:" + b.w + "px;height:" + b.h + 'px"></div>').join("");
  if (tool.extra === "signature" && state.ex.sig) {
    overlays = '<div class="sig-overlay">' + (state.ex.sig.dataUrl
      ? '<img src="' + state.ex.sig.dataUrl + '" alt="Signature" />'
      : esc(state.ex.sig.text)) + "</div>";
  }
  if (tool.extra === "toolbar" && state.ex.marks.length) {
    overlays = state.ex.marks.map((m) =>
      '<div style="position:absolute;left:' + m.x + "%;top:" + m.y + "%;width:34px;height:" + (m.kind === "highlight" ? 10 : 16) + "px;border-radius:2px;background:" + m.color + ';opacity:0.75"></div>').join("");
  }

  let before = "";
  if (tool.extra === "toolbar") {
    before = '<div class="sim-toolbar" style="margin-bottom:12px" role="toolbar" aria-label="Editing tools">' +
      tool.toolbarTools.map((t) =>
        '<button type="button" class="sim-tool' + (state.ex.activeTool === t.id ? " is-active" : "") + '" data-simtool="' + t.id + '">' + svgIcon(t.icon) + esc(t.label) + "</button>"
      ).join("") + "</div>";
  }
  if (tool.extra === "redact") {
    before = '<div class="sim-toolbar" style="margin-bottom:12px">' +
      '<button type="button" class="sim-tool" id="add-redact">' + svgIcon("square") + "Add redaction box</button>" +
      '<button type="button" class="sim-tool" id="clear-redact"' + (state.ex.redactBoxes.length ? "" : " disabled") + ">" + svgIcon("x") + "Clear (" + state.ex.redactBoxes.length + ")</button></div>";
  }

  let after = "";
  if (tool.viewerOnly && f) {
    const pages = f.pages || 1;
    after =
      '<div class="reader-bar" role="toolbar" aria-label="Reader controls">' +
      '<button type="button" class="icon-btn" id="rd-prev" aria-label="Previous page"' + (state.ex.page <= 1 ? " disabled" : "") + ">" + svgIcon("left") + "</button>" +
      '<span class="reader-info">Page ' + state.ex.page + " of " + pages + "</span>" +
      '<button type="button" class="icon-btn" id="rd-next" aria-label="Next page"' + (state.ex.page >= pages ? " disabled" : "") + ">" + svgIcon("right") + "</button>" +
      '<span style="width:12px"></span>' +
      '<button type="button" class="icon-btn" id="rd-zout" aria-label="Zoom out">' + svgIcon("zoomOut") + "</button>" +
      '<span class="reader-info" style="min-width:48px">' + state.ex.zoom + "%</span>" +
      '<button type="button" class="icon-btn" id="rd-zin" aria-label="Zoom in">' + svgIcon("zoomIn") + "</button>" +
      '<button type="button" class="btn btn-ghost btn-sm" id="rd-fit">' + svgIcon("fitWidth") + "Fit width</button></div>";
  }
  if (tool.extra === "organize" && state.ex.pages) {
    after = '<div class="thumbs" style="margin-top:14px">' + state.ex.pages.map((p, i) =>
      '<div class="thumb' + (p.deleted ? " is-deleted" : "") + '"><div class="thumb-page"></div>' +
      '<div class="thumb-num">Page ' + p.n + "</div>" +
      '<div class="thumb-actions">' +
      '<button type="button" class="icon-btn" data-pmove="-1" data-pi="' + i + '" aria-label="Move page left"' + (i === 0 ? " disabled" : "") + ">" + svgIcon("left") + "</button>" +
      '<button type="button" class="icon-btn" data-pdel="' + i + '" aria-label="' + (p.deleted ? "Restore" : "Delete") + ' page">' + svgIcon(p.deleted ? "rotate" : "trash") + "</button>" +
      '<button type="button" class="icon-btn" data-pmove="1" data-pi="' + i + '" aria-label="Move page right"' + (i === state.ex.pages.length - 1 ? " disabled" : "") + ">" + svgIcon("right") + "</button>" +
      "</div></div>"
    ).join("") + "</div>";
  }
  if (tool.extra === "formfill" && f) {
    const fields = state.ex.formFields;
    if (fields === undefined) {
      state.ex.formFields = null;
      detectFormFields(f).then((list) => {
        if (state && state.files[0] === f) { state.ex.formFields = list; renderPreview(); }
      }).catch(() => { if (state) { state.ex.formFields = []; renderPreview(); } });
    }
    if (fields == null) {
      after = '<p class="preview-caption" style="text-align:left">Detecting form fields…</p>';
    } else if (!fields.length) {
      after = '<div class="pp-warning" style="margin-top:14px">' + svgIcon("alert") + "<span>No fillable form fields were found in this PDF.</span></div>";
    } else {
      after = '<div style="margin-top:14px"><p class="opt-label">Detected form fields (' + fields.length + ")</p>" +
        '<div class="ff-fields">' + fields.map((fl, i) =>
          '<div class="ff-field"><label for="ff-' + i + '">' + esc(fl.name) + "</label>" +
          (fl.kind === "check"
            ? '<label class="check-item"><input type="checkbox" id="ff-' + i + '" data-ff="' + esc(fl.name) + '"' + (state.ex.formValues[fl.name] ? " checked" : "") + " /><span>Checked</span></label>"
            : fl.kind === "select" || fl.kind === "radio"
              ? '<select class="field-select" id="ff-' + i + '" data-ff="' + esc(fl.name) + '"><option value="">—</option>' +
                (fl.options || []).map((op) => '<option value="' + esc(op) + '"' + (state.ex.formValues[fl.name] === op ? " selected" : "") + ">" + esc(op) + "</option>").join("") + "</select>"
              : '<input class="field-input" id="ff-' + i + '" type="text" data-ff="' + esc(fl.name) + '" value="' + esc(state.ex.formValues[fl.name] || "") + '" />') +
          "</div>"
        ).join("") + "</div></div>";
    }
  }

  area.innerHTML = before +
    '<div class="preview-stage" id="preview-stage">' + stageInner + overlays + "</div>" +
    (caption ? '<p class="preview-caption">' + caption + "</p>" : "") + after;

  bindPreviewEvents();
}

function cropOverlayHtml() {
  const o = state.opts;
  const s = 0.8; /* px per mm at preview scale */
  return '<div class="crop-box" style="left:calc(50% - 85px + ' + (o.left * s) + "px);top:calc(50% - 110px + " + (o.top * s) + "px);right:calc(50% - 85px + " + (o.right * s) + "px);bottom:calc(50% - 110px + " + (o.bottom * s) + 'px)"></div>';
}

function bindPreviewEvents() {
  const area = $("#preview-area");
  const tool = state.tool;

  $$("[data-simtool]", area).forEach((b) => b.addEventListener("click", () => {
    state.ex.activeTool = state.ex.activeTool === b.dataset.simtool ? null : b.dataset.simtool;
    renderPreview();
  }));
  const stage = $("#preview-stage", area);
  if (stage && tool.extra === "toolbar") {
    stage.style.cursor = state.ex.activeTool ? "crosshair" : "";
    stage.addEventListener("click", (e) => {
      if (!state.ex.activeTool || !state.files.length) return;
      const r = stage.getBoundingClientRect();
      const colors = { text: "#3272e0", highlight: "#f5d445", draw: "#dc4a4a", shape: "#189a8c", underline: "#3272e0", comment: "#e8712e", pen: "#7b52c7" };
      state.ex.marks.push({ x: ((e.clientX - r.left) / r.width * 100).toFixed(1), y: ((e.clientY - r.top) / r.height * 100).toFixed(1), kind: state.ex.activeTool, color: colors[state.ex.activeTool] || "#3272e0" });
      renderPreview();
    });
  }

  const addR = $("#add-redact", area);
  if (addR) addR.addEventListener("click", () => {
    if (!state.files.length) { toast("Upload a file first", "error"); return; }
    state.ex.redactBoxes.push({ x: 25 + Math.random() * 40, y: 20 + Math.random() * 55, w: 60 + Math.random() * 60, h: 10 + Math.random() * 8 });
    renderPreview();
  });
  const clearR = $("#clear-redact", area);
  if (clearR) clearR.addEventListener("click", () => { state.ex.redactBoxes = []; renderPreview(); });

  $$("[data-pdel]", area).forEach((b) => b.addEventListener("click", () => {
    const p = state.ex.pages[+b.dataset.pdel];
    p.deleted = !p.deleted;
    renderPreview();
  }));
  $$("[data-pmove]", area).forEach((b) => b.addEventListener("click", () => {
    const i = +b.dataset.pi, j = i + (+b.dataset.pmove);
    if (j < 0 || j >= state.ex.pages.length) return;
    [state.ex.pages[i], state.ex.pages[j]] = [state.ex.pages[j], state.ex.pages[i]];
    renderPreview();
  }));

  $$("[data-ff]", area).forEach((inp) => inp.addEventListener(inp.type === "checkbox" || inp.tagName === "SELECT" ? "change" : "input", () => {
    state.ex.formValues[inp.dataset.ff] = inp.type === "checkbox" ? inp.checked : inp.value;
  }));

  const f = state.files[0];
  const rdPrev = $("#rd-prev", area);
  if (rdPrev) {
    const pages = (f && f.pages) || 1;
    rdPrev.addEventListener("click", () => { state.ex.page = Math.max(1, state.ex.page - 1); renderPreview(); });
    $("#rd-next", area).addEventListener("click", () => { state.ex.page = Math.min(pages, state.ex.page + 1); renderPreview(); });
    $("#rd-zin", area).addEventListener("click", () => { state.ex.zoom = Math.min(200, state.ex.zoom + 10); renderPreview(); });
    $("#rd-zout", area).addEventListener("click", () => { state.ex.zoom = Math.max(50, state.ex.zoom - 10); renderPreview(); });
    $("#rd-fit", area).addEventListener("click", () => { state.ex.zoom = 100; renderPreview(); });
  }
}

/* ---------------------------------------------------------------- image tool previews */
function cropRatio() {
  const v = state.opts.ratio;
  if (!v || v === "free") return null;
  return parseFloat(v) || null;
}

function resetCrop(dispW, dispH) {
  const r = cropRatio();
  if (!r) { state.ex.crop = { x: 0.05, y: 0.05, w: 0.9, h: 0.9 }; return; }
  let fw = 0.9, fh = (fw * dispW) / (r * dispH);
  if (fh > 0.9) { fh = 0.9; fw = (r * fh * dispH) / dispW; }
  state.ex.crop = { x: (1 - fw) / 2, y: (1 - fh) / 2, w: fw, h: fh };
}

function layoutCropBox(area) {
  const c = state.ex.crop;
  const box = $("#crop-box", area), mask = $("#crop-mask", area);
  if (!box || !c) return;
  [box, mask].forEach((el) => {
    el.style.left = c.x * 100 + "%";
    el.style.top = c.y * 100 + "%";
    el.style.width = c.w * 100 + "%";
    el.style.height = c.h * 100 + "%";
  });
  const f = state.files[0];
  const label = $("#crop-label", area);
  if (label && f && f.iw) label.textContent = Math.round(c.w * f.iw) + " × " + Math.round(c.h * f.ih) + " px";
}

function renderCropPreview(area) {
  const f = state.files[0];
  if (!f || !f.url) {
    area.innerHTML = '<p class="preview-empty">Upload an image, then drag the box to choose the crop area.</p>';
    return;
  }
  area.innerHTML =
    '<div class="preview-stage" style="padding:18px"><div class="crop-wrap" id="crop-wrap">' +
    '<img id="crop-src" src="' + f.url + '" alt="Image to crop" draggable="false" />' +
    '<div class="crop-clip"><div class="crop-mask" id="crop-mask"></div></div>' +
    '<div class="crop-box2" id="crop-box"><span class="crop-label" id="crop-label"></span>' +
    ["nw", "ne", "sw", "se"].map((h) => '<span class="crop-handle ' + h + '" data-ch="' + h + '"></span>').join("") +
    "</div></div></div>" +
    '<p class="preview-caption">Drag the box to move it · drag a corner to resize</p>';

  const img = $("#crop-src", area);
  const setup = () => {
    if (!state.ex.crop) resetCrop(img.clientWidth || 1, img.clientHeight || 1);
    layoutCropBox(area);
    bindCropEvents(area, img);
  };
  if (img.complete && img.clientWidth) setup(); else img.onload = setup;
}

function bindCropEvents(area, img) {
  const wrap = $("#crop-wrap", area);
  let drag = null;
  wrap.addEventListener("pointerdown", (e) => {
    const handle = (e.target.dataset && e.target.dataset.ch) ||
      (e.target.closest && e.target.closest("#crop-box") ? "move" : null);
    if (!handle) return;
    e.preventDefault();
    drag = { handle, sx: e.clientX, sy: e.clientY, c: { ...state.ex.crop }, rect: img.getBoundingClientRect() };
    if (wrap.setPointerCapture) wrap.setPointerCapture(e.pointerId);
  });
  wrap.addEventListener("pointermove", (e) => {
    if (!drag) return;
    const dx = (e.clientX - drag.sx) / drag.rect.width;
    const dy = (e.clientY - drag.sy) / drag.rect.height;
    const r = cropRatio();
    const min = 0.03;
    let { x, y, w, h } = drag.c;
    if (drag.handle === "move") {
      x = Math.min(Math.max(0, drag.c.x + dx), 1 - w);
      y = Math.min(Math.max(0, drag.c.y + dy), 1 - h);
    } else {
      if (drag.handle.includes("e")) w = Math.max(min, Math.min(1 - drag.c.x, drag.c.w + dx));
      if (drag.handle.includes("s")) h = Math.max(min, Math.min(1 - drag.c.y, drag.c.h + dy));
      if (drag.handle.includes("w")) {
        const nx = Math.min(Math.max(0, drag.c.x + dx), drag.c.x + drag.c.w - min);
        w = drag.c.w + (drag.c.x - nx); x = nx;
      }
      if (drag.handle.includes("n")) {
        const ny = Math.min(Math.max(0, drag.c.y + dy), drag.c.y + drag.c.h - min);
        h = drag.c.h + (drag.c.y - ny); y = ny;
      }
      if (r) {
        h = (w * drag.rect.width) / (r * drag.rect.height);
        if (y + h > 1) { h = 1 - y; w = (r * h * drag.rect.height) / drag.rect.width; }
        if (drag.handle.includes("n")) y = Math.max(0, drag.c.y + drag.c.h - h);
      }
    }
    state.ex.crop = { x, y, w, h };
    layoutCropBox(area);
  });
  const stop = () => { drag = null; };
  wrap.addEventListener("pointerup", stop);
  wrap.addEventListener("pointercancel", stop);
}

function renderBgErasePreview(area) {
  const f = state.files[0];
  if (!f || !f.url) {
    area.innerHTML = '<p class="preview-empty">Upload an image, then paint over the background to erase it.</p>';
    return;
  }
  const mode = state.ex.bgMode || "erase";
  area.innerHTML =
    '<div class="sim-toolbar" style="margin-bottom:12px">' +
    '<div class="seg" role="tablist">' +
    '<button type="button" data-bgm="erase" class="' + (mode === "erase" ? "is-active" : "") + '">Erase</button>' +
    '<button type="button" data-bgm="restore" class="' + (mode === "restore" ? "is-active" : "") + '">Restore</button></div>' +
    '<button type="button" class="sim-tool" id="bg-reset">' + svgIcon("x") + "Reset</button></div>" +
    '<div class="preview-stage" style="padding:16px"><div class="bg-canvas-holder" id="bg-holder"></div></div>' +
    '<p class="preview-caption">Paint to ' + (mode === "erase" ? "erase — checkered areas are transparent" : "restore erased areas") + "</p>";

  const attach = (canvas) => {
    $("#bg-holder", area).appendChild(canvas);
    bindBgPaint(canvas);
  };
  if (state.ex.bgCanvas) attach(state.ex.bgCanvas);
  else {
    loadImg(f.url).then((img) => {
      const work = makeCanvas(img.naturalWidth, img.naturalHeight);
      work.getContext("2d").drawImage(img, 0, 0);
      state.ex.bgImg = img;
      state.ex.bgCanvas = work;
      if (state.files[0] === f) attach(work);
    }).catch(() => {});
  }
  $$("[data-bgm]", area).forEach((b) => b.addEventListener("click", () => {
    state.ex.bgMode = b.dataset.bgm;
    renderPreview();
  }));
  $("#bg-reset", area).addEventListener("click", () => {
    if (state.ex.bgCanvas && state.ex.bgImg) {
      const ctx = state.ex.bgCanvas.getContext("2d");
      ctx.clearRect(0, 0, state.ex.bgCanvas.width, state.ex.bgCanvas.height);
      ctx.drawImage(state.ex.bgImg, 0, 0);
      toast("Image restored");
    }
  });
}

function bindBgPaint(canvas) {
  const ctx = canvas.getContext("2d");
  let painting = false;
  const paint = (e) => {
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scale;
    const y = (e.clientY - rect.top) * scale;
    const radius = Math.max(2, (Number(state.opts.brush) || 30)) * scale / 2;
    ctx.save();
    if ((state.ex.bgMode || "erase") === "restore" && state.ex.bgImg) {
      ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(state.ex.bgImg, 0, 0);
    } else {
      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  };
  canvas.addEventListener("pointerdown", (e) => {
    painting = true;
    if (canvas.setPointerCapture) canvas.setPointerCapture(e.pointerId);
    paint(e);
  });
  canvas.addEventListener("pointermove", (e) => { if (painting) paint(e); });
  const stop = () => { painting = false; };
  canvas.addEventListener("pointerup", stop);
  canvas.addEventListener("pointercancel", stop);
}

function renderMergePreview(area) {

      '<span class="merge-ord">' + (i + 1) + "</span>" +

      '<div class="merge-pages">' + (f.pages ? f.pages + " page" + (f.pages > 1 ? "s" : "") : formatSize(f.size)) + "</div>" +
      '<div class="merge-nav">' +
      '<button type="button" class="icon-btn" data-mmove="-1" data-mi2="' + i + '" aria-label="Move earlier"' + (i === 0 ? " disabled" : "") + ">" + svgIcon("left") + "</button>" +
      '<button type="button" class="icon-btn" data-mmove="1" data-mi2="' + i + '" aria-label="Move later"' + (i === state.files.length - 1 ? " disabled" : "") + ">" + svgIcon("right") + "</button>" +
      "</div></div>"
    ).join("") +
    '<button type="button" class="merge-add" id="merge-add">' + svgIcon("upload") + "<span>Add PDF, image,<br />Word, Excel, or<br />PowerPoint files</span></button>" +
    "</div>" +
    '<p class="preview-caption" style="text-align:left">Files are merged in the order shown — drag cards or use the arrows to reorder.</p>';

  const grid = $("#merge-grid", area);
  let dragFrom = null;

  $$(".merge-card", grid).forEach((card) => {
    card.addEventListener("dragstart", (e) => {
      dragFrom = +card.dataset.mi;
      card.classList.add("is-dragging");
      e.dataTransfer.effectAllowed = "move";
      try { e.dataTransfer.setData("text/plain", String(dragFrom)); } catch { /* IE quirk */ }
    });
    card.addEventListener("dragend", () => {
      dragFrom = null;
      $$(".merge-card", grid).forEach((c) => c.classList.remove("is-dragging", "is-dragover"));
    });
    card.addEventListener("dragover", (e) => {
      if (dragFrom === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      card.classList.add("is-dragover");
    });
    card.addEventListener("dragleave", () => card.classList.remove("is-dragover"));
    card.addEventListener("drop", (e) => {
      e.preventDefault();
      const to = +card.dataset.mi;
      if (dragFrom === null || dragFrom === to) return;
      const [moved] = state.files.splice(dragFrom, 1);
      state.files.splice(to, 0, moved);
      dragFrom = null;
      renderFilesArea(); renderPreview();
    });
  });

  $$("[data-mremove]", grid).forEach((b) => b.addEventListener("click", () => removeFile(+b.dataset.mremove)));
  $$("[data-mmove]", grid).forEach((b) => b.addEventListener("click", () => moveFile(+b.dataset.mi2, +b.dataset.mmove)));
  $("#merge-add", grid).addEventListener("click", () => {
    const input = $("#file-input");
    if (input) input.click();
  });
}

/* ==========================================================================
   Print tools — mm-based layout engine
   ========================================================================== */
const PAPERS = { a4: [210, 297], a5: [148, 210], letter: [215.9, 279.4], legal: [215.9, 355.6] };
const KTP = { w: 85.6, h: 53.98 };
const CARD_SIZES = { ktp: [85.6, 53.98], "2x3": [20, 30], "3x4": [30, 40], "4x6": [40, 60] };
const mm2 = (v) => Math.round(v * 100) / 100;

function paperDims() {
  const o = state.opts;
  let [w, h] = o.paperSize === "custom"
    ? [Number(o.paperW) || 210, Number(o.paperH) || 297]
    : PAPERS[o.paperSize];
  if (o.orientation === "landscape") [w, h] = [h, w];
  return { W: w, H: h };
}

function idCardLayout() {
  const o = state.opts;
  const { W, H } = paperDims();
  const preset = CARD_SIZES[o.cardSize] || CARD_SIZES.ktp;
  const cw = o.cardSize === "custom" ? Number(o.cardW) || KTP.w : preset[0];
  const ch = o.cardSize === "custom" ? Number(o.cardH) || KTP.h : preset[1];
  const m = o.margin === "custom" ? Number(o.marginCustom) || 0 : { none: 0, small: 5, medium: 10 }[o.margin];
  const gx = o.gap === "auto" ? 4 : Number(o.gapX) || 0;
  const gy = o.gap === "auto" ? 4 : Number(o.gapY) || 0;
  const count = o.cardsPerPage === "custom" ? Math.max(1, Number(o.cardsCustom) || 1) : Number(o.cardsPerPage);

  const maxCols = Math.max(1, Math.floor((W - 2 * m + gx) / (cw + gx)));
  const maxRows = Math.max(1, Math.floor((H - 2 * m + gy) / (ch + gy)));
  const capacity = maxCols * maxRows;
  const placed = Math.min(count, capacity);

  let cols, rows;
  if (o.direction === "ttb") { rows = Math.min(placed, maxRows); cols = Math.ceil(placed / rows); }
  else { cols = Math.min(placed, maxCols); rows = Math.ceil(placed / cols); }

  const gridW = cols * cw + (cols - 1) * gx;
  const gridH = rows * ch + (rows - 1) * gy;
  let ox, oy;
  switch (o.alignment) {
    case "top-left": ox = m; oy = m; break;
    case "top-center": ox = (W - gridW) / 2; oy = m; break;
    case "custom": ox = (W - gridW) / 2 + (Number(o.offX) || 0); oy = (H - gridH) / 2 + (Number(o.offY) || 0); break;
    default: ox = (W - gridW) / 2; oy = (H - gridH) / 2;
  }

  const items = [];
  for (let i = 0; i < placed; i++) {
    const c = o.direction === "ttb" ? Math.floor(i / rows) : i % cols;
    const r = o.direction === "ttb" ? i % rows : Math.floor(i / cols);
    items.push({ x: mm2(ox + c * (cw + gx)), y: mm2(oy + r * (ch + gy)), w: cw, h: ch, n: i + 1 });
  }
  return { W, H, items, cw, ch, m, gx, gy, count, placed, truncated: count > capacity };
}

function sectionLayout() {
  const o = state.opts;
  const { W, H } = paperDims();
  let cols, rows;
  if (o.layout === "custom") {
    rows = Math.max(1, Number(o.rows) || 1);
    cols = Math.max(1, Number(o.cols) || 1);
  } else {
    [cols, rows] = o.layout.split("x").map(Number);
  }
  const gap = o.sectionGap === "custom" ? Number(o.sectionGapCustom) || 0 : 0;
  const sm = o.sectionMargin === "custom" ? Number(o.sectionMarginCustom) || 0 : { none: 0, small: 3, medium: 6 }[o.sectionMargin];
  const sw = (W - (cols - 1) * gap) / cols;
  const sh = (H - (rows - 1) * gap) / rows;

  const items = [];
  const total = rows * cols;
  for (let i = 0; i < total; i++) {
    const c = o.pageOrder === "tblr" ? Math.floor(i / rows) : i % cols;
    const r = o.pageOrder === "tblr" ? i % rows : Math.floor(i / cols);
    const sx = c * (sw + gap), sy = r * (sh + gap);
    items.push({
      x: mm2(sx + sm), y: mm2(sy + sm),
      w: mm2(Math.max(1, sw - 2 * sm)), h: mm2(Math.max(1, sh - 2 * sm)),
      sx: mm2(sx), sy: mm2(sy), sw: mm2(sw), sh: mm2(sh), n: i + 1,
    });
  }
  return { W, H, items, rows, cols, sw, sh, sm, gap };
}

function edgeLines(layout, isSections) {
  const xs = new Set(), ys = new Set();
  layout.items.forEach((it) => {
    const x1 = isSections ? it.sx : it.x, x2 = isSections ? it.sx + it.sw : it.x + it.w;
    const y1 = isSections ? it.sy : it.y, y2 = isSections ? it.sy + it.sh : it.y + it.h;
    [x1, x2].forEach((x) => { if (x > 0.5 && x < layout.W - 0.5) xs.add(mm2(x)); });
    [y1, y2].forEach((y) => { if (y > 0.5 && y < layout.H - 0.5) ys.add(mm2(y)); });
  });
  return { xs: [...xs], ys: [...ys] };
}

/* File assigned to a layout slot, per tool + placement rules */
function slotContent(tool, item, side) {
  if (tool.printCard) {
    const idx = side === "back" ? 1 : 0;
    const f = state.files[idx] || state.files[0];
    return f ? { file: f, idx: state.files.indexOf(f) } : null;
  }
  const o = state.opts;
  if (!state.files.length) return null;
  if (o.placement === "per-file") {
    const f = state.files[(item.n - 1) % state.files.length];
    return { file: f, idx: state.files.indexOf(f) };
  }
  if (o.placement === "pages") {
    const f = state.files[0];
    if (f.ext === ".pdf" || f.ext === ".doc" || f.ext === ".docx") {
      return { file: f, idx: 0, label: "Page " + item.n };
    }
    return { file: f, idx: 0 };
  }
  return { file: state.files[0], idx: 0 };
}

/* Pages ready for print DOM / PDF generation */
function buildPrintPages() {
  const tool = state.tool;
  const o = state.opts;
  if (tool.printCard) {
    const L = idCardLayout();
    const lines = o.cutLines ? edgeLines(L, false) : null;
    const front = { items: L.items.map((it) => ({ ...it, content: slotContent(tool, it, "front") })), lines, scaleMode: o.scaleMode, border: o.border };
    const pages = [front];
    if (o.doubleSided) {
      const backItems = L.items.map((it) => {
        const x = o.backAlign === "mirror" ? mm2(L.W - it.x - it.w) : it.x;
        return { ...it, x, content: slotContent(tool, it, "back") };
      });
      pages.push({ items: backItems, lines, scaleMode: o.scaleMode, border: o.border });
    }
    return { W: L.W, H: L.H, pages, layout: L };
  }
  const L = sectionLayout();
  const lines = (o.dividerLines || o.cutLines) ? edgeLines(L, true) : null;
  return {
    W: L.W, H: L.H, layout: L,
    pages: [{
      items: L.items.map((it) => ({ ...it, content: slotContent(state.tool, it) })),
      lines, scaleMode: o.scaleMode, border: false, numbers: o.sectionNumber,
    }],
  };
}

/* ---------------------------------------------------------------- print preview */
function slotInnerHtml(content, scaleMode) {
  if (!content) {
    return '<div class="pp-ph">' + svgIcon("upload") + "<span>Upload file</span></div>";
  }
  const src = content.file.url || content.file.thumb;
  if (content.label || !src) {
    return '<div class="pp-ph">' + svgIcon("file") + "<span>" + esc(content.label || content.file.name) + "</span></div>";
  }
  return '<img src="' + src + '" alt="" />';
}

function renderPrintPreview(area) {
  const tool = state.tool;
  const o = state.opts;
  const built = buildPrintPages();
  const { W, H } = built;
  const isCard = !!tool.printCard;
  const tab = state.ex.printTab === "back" && o.doubleSided && isCard ? 1 : 0;
  const page = built.pages[Math.min(tab, built.pages.length - 1)];
  const pct = (v, total) => (v / total * 100).toFixed(3) + "%";

  const tabs = isCard && o.doubleSided
    ? '<div class="seg" role="tablist">' +
      '<button type="button" role="tab" data-ptab="front" class="' + (tab === 0 ? "is-active" : "") + '" aria-selected="' + (tab === 0) + '">Front page</button>' +
      '<button type="button" role="tab" data-ptab="back" class="' + (tab === 1 ? "is-active" : "") + '" aria-selected="' + (tab === 1) + '">Back page</button></div>'
    : "";

  const itemsHtml = page.items.map((it) => {
    const safe = isCard && o.safeArea ? '<span class="pp-safe" style="inset:' + pct(3, it.h) + " " + pct(3, it.w) + '"></span>' : "";
    const num = page.numbers ? '<span class="pp-num">' + it.n + "</span>" : "";
    return '<div class="pp-card mode-' + page.scaleMode + (page.border || (!isCard && o.dividerLines) ? " has-border" : "") + '" style="left:' + pct(it.x, W) + ";top:" + pct(it.y, H) + ";width:" + pct(it.w, W) + ";height:" + pct(it.h, H) + '">' +
      slotInnerHtml(it.content, page.scaleMode) + safe + num + "</div>";
  }).join("");

  const linesHtml = page.lines
    ? page.lines.ys.map((y) => '<div class="pp-cut h" style="top:' + pct(y, H) + '"></div>').join("") +
      page.lines.xs.map((x) => '<div class="pp-cut v" style="left:' + pct(x, W) + '"></div>').join("")
    : "";

  const L = built.layout;
  const paperName = o.paperSize === "custom" ? "Custom" : o.paperSize.toUpperCase();
  const chips = isCard
    ? ['Paper: ' + paperName + " " + mm2(W) + " × " + mm2(H) + " mm",
       "Card: " + mm2(L.cw) + " × " + mm2(L.ch) + " mm",
       "Margin: " + L.m + " mm", "Gap: " + L.gx + " × " + L.gy + " mm",
       "Cards: " + L.placed + (built.pages.length > 1 ? " × 2 sides" : "")]
    : ['Paper: ' + paperName + " " + mm2(W) + " × " + mm2(H) + " mm",
       "Grid: " + L.rows + " × " + L.cols + " (" + L.items.length + " sections)",
       "Section: " + mm2(L.sw) + " × " + mm2(L.sh) + " mm",
       "Section margin: " + L.sm + " mm"];

  let warning = "";
  if (isCard && L.truncated) {
    warning = "Only " + L.placed + " of " + L.count + " cards fit on this paper with the current card size, margin, and gap.";
  } else if (o.scaleMode === "fill" && state.files.length) {
    warning = "Fill mode may crop the content to match the " + (isCard ? "card" : "section") + " ratio.";
  } else if (o.scaleMode === "actual" && state.files.length) {
    warning = "Actual size may overflow the section if the content is larger than the section.";
  }

  const stageStyle = "height:430px;aspect-ratio:" + W + "/" + H + ";flex-shrink:0";

  area.innerHTML =
    '<div class="pp-toolbar">' + (tabs || "<span></span>") +
    '<span style="font-size:12px;color:var(--ink-muted)">Live preview · updates with options</span></div>' +
    '<div class="paper-stage" style="overflow:auto"><div class="paper" style="' + stageStyle + '">' + itemsHtml + linesHtml + "</div></div>" +
    '<div class="pp-meta">' + chips.map((c) => '<span class="pp-chip">' + esc(c) + "</span>").join("") + "</div>" +
    (warning ? '<div class="pp-warning">' + svgIcon("alert") + "<span>" + esc(warning) + "</span></div>" : "") +
    '<div class="print-instructions"><strong>Print settings</strong><ul>' +
    (tool.printInstructions || []).map((t) => "<li>" + esc(t) + "</li>").join("") + "</ul></div>";

  $$("[data-ptab]", area).forEach((b) => b.addEventListener("click", () => {
    state.ex.printTab = b.dataset.ptab;
    renderPrintPreview(area);
  }));
}

/* ---------------------------------------------------------------- options */
function optVisible(o) {
  if (!o.showIf) return true;
  const v = state.opts[o.showIf.id];
  if ("value" in o.showIf) return v === o.showIf.value;
  if ("not" in o.showIf) return v !== o.showIf.not;
  return true;
}

function renderOptionHtml(o) {
  const v = state.opts[o.id];
  const hidden = optVisible(o) ? "" : " hidden";
  let inner = "";
  switch (o.type) {
    case "radio":
      inner = '<span class="opt-label">' + esc(o.label) + '</span><div class="radio-list" role="radiogroup" aria-label="' + esc(o.label) + '">' +
        o.choices.map((c) =>
          '<label class="radio-item' + (v === c.v ? " is-checked" : "") + '">' +
          '<input type="radio" name="opt-' + o.id + '" value="' + esc(c.v) + '"' + (v === c.v ? " checked" : "") + ' data-opt="' + o.id + '" />' +
          '<span><span class="radio-title">' + esc(c.label) + "</span>" + (c.hint ? '<br /><span class="radio-hint">' + esc(c.hint) + "</span>" : "") + "</span></label>"
        ).join("") + "</div>";
      break;
    case "select":
      inner = '<label class="opt-label" for="opt-' + o.id + '">' + esc(o.label) + "</label>" +
        '<select class="field-select" id="opt-' + o.id + '" data-opt="' + o.id + '">' +

      break;
    default: /* text, number, password, email */
      inner = '<label class="opt-label" for="opt-' + o.id + '">' + esc(o.label) + (o.suffix ? ' <span style="font-weight:400;color:var(--ink-muted)">(' + o.suffix + ")</span>" : "") + "</label>" +

function bindSignatureEvents(panel) {

  if (canvas) {
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 3.5; ctx.lineCap = "round"; ctx.strokeStyle = "#22314f";
    let drawing = false, drew = false;
    const pos = (e) => {
      const r = canvas.getBoundingClientRect();
      return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
    };
    canvas.addEventListener("pointerdown", (e) => { drawing = true; drew = false; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); canvas.setPointerCapture(e.pointerId); });
    canvas.addEventListener("pointermove", (e) => { if (!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); drew = true; });
    canvas.addEventListener("pointerup", () => {
      drawing = false;
      if (drew) { state.ex.sig = { dataUrl: canvas.toDataURL("image/png") }; renderPreview(); const n = $("#sig-clear"); if (n) n.disabled = false; }
    });
  }
  const typed = $("#sig-type", panel);
  if (typed) typed.addEventListener("input", () => {
    state.ex.sig = typed.value.trim() ? { text: typed.value.trim() } : null;
    renderPreview();

  const up = $("#sig-upload", panel);

    reader.onload = () => { state.ex.sig = { dataUrl: reader.result }; renderPreview(); renderRightPanel(); };
    reader.readAsDataURL(file);
  });
}
