  }
  return { sys, user: task + "\n\n=== DOCUMENT ===\n" + docText };
}

/* "local" = opened from your computer (uses ai-proxy.py on localhost)
   "online" = hosted on a website (uses ai-proxy.php on the same server) */
const DEPLOY = "online";
/* Optional: set to a background-removal API endpoint to enable Remove Background auto mode */
const REMOVE_BG_ENDPOINT = "";
const AI_PROXY_ORIGIN = "http://localhost:8787";
const AI_PROXY_PHP = "ai-proxy.php";

async function callAi(prompt) {
  const cfg = getAiCfg();
  const provider = AI_PROVIDERS[cfg.provider] || AI_PROVIDERS.custom;
  const proto = provider.proto;
  const base = cfg.baseUrl.replace(/\/+$/, "");
  const path = proto === "anthropic" ? "/messages" : "/chat/completions";

  const headers = { "Content-Type": "application/json" };
  let payload;
  if (proto === "anthropic") {
    headers["x-api-key"] = cfg.apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
    payload = JSON.stringify({
      model: cfg.model,
      max_tokens: 4096,
      system: prompt.sys,
      messages: [{ role: "user", content: prompt.user }],
    });
  } else {
    headers.Authorization = "Bearer " + cfg.apiKey;
    payload = JSON.stringify({
      model: cfg.model,
      messages: [{ role: "system", content: prompt.sys }, { role: "user", content: prompt.user }],
    });
  }

  /* When going through the local proxy, tell it where to forward */
  let upstreamOrigin = "", basePath = "/v1";
  try {
    const u = new URL(base.startsWith(AI_PROXY_ORIGIN) ? (provider.baseUrl || base) : base);
    upstreamOrigin = u.origin;
    basePath = u.pathname.replace(/\/+$/, "") || "";
  } catch { /* keep defaults */ }

  const doFetch = (url, viaProxy) => fetch(url, {
    method: "POST",
    headers: viaProxy
      ? {
          ...headers,
          "x-upstream-origin": upstreamOrigin,
          /* Apache on shared hosting often strips Authorization — send a copy */
          ...(headers.Authorization ? { "x-proxy-authorization": headers.Authorization } : {}),
        }
      : headers,
    body: payload,
  });

  /* Always reach the PHP proxy over https — a Force-HTTPS redirect would
     turn our POST into a GET (→ 405) if the page was opened over http. */
  const phpProxyBase = location.protocol === "http:" && location.hostname !== "localhost"
    ? "https://" + location.host + location.pathname.replace(/[^/]*$/, "") + AI_PROXY_PHP
    : AI_PROXY_PHP;
  const proxyUrl = DEPLOY === "online"
    ? phpProxyBase + "?path=" + encodeURIComponent(basePath + path)
    : AI_PROXY_ORIGIN + basePath + path;
  const proxyFailMsg = DEPLOY === "online"
    ? "The provider blocks browser requests and the server proxy is unreachable. Make sure ai-proxy.php is uploaded to the same folder as index.html on your hosting."
    : "The provider blocks browser (CORS) requests. Open Terminal, run “python3 ai-proxy.py” from the app folder, then try again.";

  let res;
  if (DEPLOY === "local" && base.startsWith(AI_PROXY_ORIGIN)) {
    try {
      res = await doFetch(base + path, true);
    } catch {
      throw new Error("Local proxy is not running. Open Terminal, run “python3 ai-proxy.py” from the app folder, then try again.");
    }
  } else {
    try {
      res = await doFetch(base + path, false);
    } catch {
      /* Direct call blocked (CORS) — retry through the bundled proxy */
      try {
        res = await doFetch(proxyUrl, true);
        if (DEPLOY === "local") {
          setAiCfg({ baseUrl: AI_PROXY_ORIGIN + basePath });
          toast("Connected through the local proxy (localhost:8787)");
        }
      } catch {
        throw new Error(proxyFailMsg);
      }
    }
  }

  if (!res.ok) {
    let detail = "";
    try { detail = (await res.json()).error?.message || ""; } catch { /* ignore */ }
    throw new Error("AI request failed (" + res.status + ")" + (detail ? ": " + detail.slice(0, 160) : "."));
  }
  const data = await res.json();
  const text = proto === "anthropic"
    ? data.content && data.content[0] && data.content[0].text
    : data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
  if (!text) throw new Error("The AI response was empty.");
  return text.trim();
}

/* ---------------------------------------------------------------- validate + process */
function validate() {
  const tool = state.tool;
  const needsFile = tool.accept.length > 0 && tool.extra !== "textinput";

  if (tool.extra === "htmlinput") {
    const src = state.ex.htmlMode === "url" ? state.ex.url : state.ex.html;
    if (!src.trim()) return "Enter a URL or paste HTML code first.";
    if (state.ex.htmlMode === "url" && !/^https?:\/\/.+\..+/.test(state.ex.url.trim())) return "Enter a valid URL (including https://).";
  } else if (tool.extra === "textinput") {
    if (!state.files.length && !state.ex.pastedText.trim()) return "Upload a .txt file or paste some text first.";
  } else if (needsFile && state.files.length === 0) {
    return "Upload a file before processing.";
  }
  if (tool.minFiles && state.files.length < tool.minFiles) {
    return "This tool needs at least " + tool.minFiles + " files.";
  }
  for (const id of tool.required || []) {
    const def = (tool.options || []).find((o) => o.id === id);
    if (!String(state.opts[id] || "").trim()) return (def ? '"' + def.label + '"' : "A required field") + " is required.";
  }
  for (const rule of tool.requiredIf || []) {
    const w = rule.when;
    const active = "value" in w ? state.opts[w.id] === w.value : state.opts[w.id] !== w.not;
    if (active && !String(state.opts[rule.id] || "").trim()) {
      const def = (tool.options || []).find((o) => o.id === rule.id);
      return (def ? '"' + def.label + '"' : "A required field") + " is required.";
    }
  }
  if (tool.id === "protect-pdf" && state.opts.password !== state.opts.confirmPassword) {
    return "Passwords do not match.";
  }
  if (tool.extra === "print") {
    const o = state.opts;
    if (o.paperSize === "custom" && (!Number(o.paperW) || !Number(o.paperH))) return "Enter a custom paper width and height.";
    if (o.cardSize === "custom" && (!Number(o.cardW) || !Number(o.cardH))) return "Enter a custom card width and height.";
    if (o.cardsPerPage === "custom" && !Number(o.cardsCustom)) return "Enter the number of cards per page.";
    if (o.layout === "custom" && (!Number(o.rows) || !Number(o.cols))) return "Enter custom rows and columns.";
    if (tool.printCard && o.doubleSided && state.files.length < 2) {
      return "Double-sided mode needs two files: front side and back side.";
    }
  }
  if (tool.extra === "signature" && !state.ex.sig) return "Add a signature first.";
  if (tool.extra === "recipients" && state.ex.recipients.length === 0) return "Add at least one recipient.";
  return null;
}

function estimateOutput(tool, inputSize) {
  const factors = { "compress-pdf": { low: 0.78, recommended: 0.48, high: 0.25 } };
  if (tool.id === "compress-pdf") return Math.max(20 * 1024, Math.round(inputSize * factors["compress-pdf"][state.opts.level]));
  if (!tool.output) return 0;
  if (tool.output.ext === "zip") return Math.round(inputSize * 0.82);
  if (tool.output.ext === "txt") return Math.min(inputSize, 14 * 1024);
  if (tool.id === "protect-pdf") return Math.round(inputSize * 1.03);
  return Math.round(inputSize * 0.94);
}

async function startProcess() {
  const err = validate();
  if (err) { toast(err, "error"); return; }
  const tool = state.tool;
  if (tool.ai && getAiCfg().apiKey.trim()) { runAiProcess(); return; }
  if (tool.ai) toast("No API key set — running a simulated demo. Add your key under AI settings for real results.", "error");
  if (tool.confirm) {
    const ok = await confirmModal({ title: tool.confirm.title, body: tool.confirm.body, danger: tool.id !== "protect-pdf", okLabel: processLabel(tool) });
    if (!ok) return;
  }

  if (REAL_HANDLERS[tool.id]) { runRealProcess(); return; }

  state.phase = "processing";
  renderRightPanel(); renderFilesArea();
  toast("Processing started");

  const steps = tool.steps || DEFAULT_STEPS;
  const total = 2600 + Math.random() * 900;
  const started = performance.now();

  const timer = setInterval(() => {
    const elapsed = performance.now() - started;
    const pct = Math.min(100, Math.round((elapsed / total) * 100));
    const fill = $("#progress-fill"), step = $("#step-label"), pctEl = $("#pct-label");
    if (fill) fill.style.width = pct + "%";
    if (pctEl) pctEl.textContent = pct + "%";
    if (step) step.textContent = steps[Math.min(steps.length - 1, Math.floor((pct / 100) * steps.length))] + "…";
    if (pct >= 100) {
      clearInterval(timer);
      finishProcess(Math.round(performance.now() - started));
    }
  }, 80);
}

function finishProcess(elapsedMs) {
  const tool = state.tool;
  const inputSize = state.files.reduce((s, f) => s + f.size, 0) ||
    (state.ex.pastedText || state.ex.html || state.ex.url || "").length || 48 * 1024;
  state.result = {
    inputName: state.files.length ? state.files[0].name + (state.files.length > 1 ? " (+" + (state.files.length - 1) + " more)" : "") :
      (tool.extra === "htmlinput" ? (state.ex.htmlMode === "url" ? state.ex.url.trim() : "Pasted HTML") : "Pasted text"),
    inputSize,
    outputSize: estimateOutput(tool, inputSize),
    time: (elapsedMs / 1000).toFixed(1) + "s",
    link: "https://pdf.tools/s/" + Math.random().toString(36).slice(2, 10),
  };
  state.phase = "done";
  renderRightPanel(); renderFilesArea();
  toast("Processing complete");
}

/* ---------------------------------------------------------------- print output */
const MM2PT = 72 / 25.4;

function loadImageData(f) {
  return new Promise((resolve) => {
    const src = f && (f.url || f.thumb);
    if (!src) { resolve(null); return; }
    const img = new Image();
    const bail = setTimeout(() => resolve(null), 3000);
    img.onload = () => {
      clearTimeout(bail);
      try {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth || 800;
        canvas.height = img.naturalHeight || 500;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        const bin = atob(canvas.toDataURL("image/jpeg", 0.92).split(",")[1]);
        resolve({ bin, w: canvas.width, h: canvas.height });
      } catch { resolve(null); }
    };
    img.onerror = () => { clearTimeout(bail); resolve(null); };
    img.src = src;
  });
}

function fitRect(box, iw, ih, mode) {
  if (mode === "stretch" || !iw || !ih) return { ...box, clip: false };
  if (mode === "actual") {
    const w = iw * 25.4 / 96, h = ih * 25.4 / 96;
    return { x: box.x + (box.w - w) / 2, y: box.y + (box.h - h) / 2, w, h, clip: true };
  }
  const s = mode === "fill" ? Math.max(box.w / iw, box.h / ih) : Math.min(box.w / iw, box.h / ih);
  const w = iw * s, h = ih * s;
  return { x: box.x + (box.w - w) / 2, y: box.y + (box.h - h) / 2, w, h, clip: mode === "fill" };
}

/* Build a real, mm-accurate vector PDF with embedded JPEG images */
async function generateLayoutPdf() {
  const built = buildPrintPages();
  const { W, H, pages } = built;
  const Wpt = W * MM2PT, Hpt = H * MM2PT;

  const images = [];
  for (const f of state.files) images.push(await loadImageData(f));

  const nImg = images.length;
  const FONT = nImg + 1;
  const nPages = pages.length;
  const CONTENT0 = FONT + 1;
  const PAGE0 = CONTENT0 + nPages;
  const TREE = PAGE0 + nPages;
  const CATALOG = TREE + 1;

  const objs = [];
  images.forEach((im) => {
    objs.push(im
      ? "<</Type/XObject/Subtype/Image/Width " + im.w + "/Height " + im.h + "/ColorSpace/DeviceRGB/BitsPerComponent 8/Filter/DCTDecode/Length " + im.bin.length + ">>\nstream\n" + im.bin + "\nendstream"
      : "<</Type/XObject/Subtype/Form/BBox[0 0 1 1]/Length 0>>\nstream\n\nendstream");
  });
  objs.push("<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>");

  const p2 = (v) => (Math.round(v * 100) / 100).toFixed(2);
  pages.forEach((pg) => {
    const ops = [];
    pg.items.forEach((it) => {
      const bx = it.x * MM2PT, byTop = it.y * MM2PT, bw = it.w * MM2PT, bh = it.h * MM2PT;
      const by = Hpt - byTop - bh;
      const c = it.content;
      const im = c && c.idx != null && !c.label ? images[c.idx] : null;
      if (im) {
        const r = fitRect({ x: it.x, y: it.y, w: it.w, h: it.h }, im.w, im.h, pg.scaleMode);
        const rx = r.x * MM2PT, rw = r.w * MM2PT, rh = r.h * MM2PT;
        const ry = Hpt - r.y * MM2PT - rh;
        ops.push("q " + (r.clip ? p2(bx) + " " + p2(by) + " " + p2(bw) + " " + p2(bh) + " re W n " : "") +
          p2(rw) + " 0 0 " + p2(rh) + " " + p2(rx) + " " + p2(ry) + " cm /Im" + c.idx + " Do Q");
      } else if (c) {
        ops.push("q 0.65 G 0.5 w [2 2] 0 d " + p2(bx) + " " + p2(by) + " " + p2(bw) + " " + p2(bh) + " re S Q");
        const label = (c.label || c.file.name).slice(0, 28);
        ops.push("BT /F1 7 Tf 0.45 g " + p2(bx + 4) + " " + p2(by + bh / 2) + " Td (" + label.replace(/[()\\]/g, "") + ") Tj ET 0 g");
      }
      if (pg.border) ops.push("q 0.55 G 0.6 w " + p2(bx) + " " + p2(by) + " " + p2(bw) + " " + p2(bh) + " re S Q");
      if (pg.numbers) ops.push("BT /F1 6 Tf 0.5 g " + p2(bx + 2) + " " + p2(by + bh - 8) + " Td (" + it.n + ") Tj ET 0 g");
    });
    if (pg.lines) {
      pg.lines.ys.forEach((y) => {
        const py = Hpt - y * MM2PT;
        ops.push("q 0.62 G 0.4 w [3 3] 0 d 0 " + p2(py) + " m " + p2(Wpt) + " " + p2(py) + " l S Q");
      });
      pg.lines.xs.forEach((x) => {
        ops.push("q 0.62 G 0.4 w [3 3] 0 d " + p2(x * MM2PT) + " 0 m " + p2(x * MM2PT) + " " + p2(Hpt) + " l S Q");
      });
    }
    const stream = ops.join("\n");
    objs.push("<</Length " + stream.length + ">>\nstream\n" + stream + "\nendstream");
  });

  const xobjEntries = images.map((im, i) => "/Im" + i + " " + (i + 1) + " 0 R").join(" ");
  pages.forEach((pg, i) => {
    objs.push("<</Type/Page/Parent " + TREE + " 0 R/MediaBox[0 0 " + p2(Wpt) + " " + p2(Hpt) + "]/Contents " + (CONTENT0 + i) + " 0 R" +
      "/Resources<</Font<</F1 " + FONT + " 0 R>>" + (nImg ? "/XObject<<" + xobjEntries + ">>" : "") + ">>>>");
  });
  objs.push("<</Type/Pages/Kids[" + pages.map((_, i) => (PAGE0 + i) + " 0 R").join(" ") + "]/Count " + nPages + ">>");
  objs.push("<</Type/Catalog/Pages " + TREE + " 0 R>>");

  let pdf = "%PDF-1.4\n";
  const offsets = [];
  objs.forEach((body, i) => {
    offsets.push(pdf.length);
    pdf += (i + 1) + " 0 obj\n" + body + "\nendobj\n";
  });
  const xrefPos = pdf.length;
  pdf += "xref\n0 " + (objs.length + 1) + "\n0000000000 65535 f \n";
  offsets.forEach((off) => { pdf += String(off).padStart(10, "0") + " 00000 n \n"; });
  pdf += "trailer\n<</Size " + (objs.length + 1) + "/Root " + CATALOG + " 0 R>>\nstartxref\n" + xrefPos + "\n%%EOF";

  const bytes = new Uint8Array(pdf.length);
  for (let i = 0; i < pdf.length; i++) bytes[i] = pdf.charCodeAt(i) & 0xff;
  return new Blob([bytes], { type: "application/pdf" });
}

/* Tiny markdown renderer for AI output (input is HTML-escaped first) */
function mdToHtml(md) {
  const lines = esc(md).split(/\r?\n/);
  let html = "", inUl = false, inOl = false, para = [];
  const inline = (s) => s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[\s(])\*([^*\s][^*]*?)\*(?=[\s.,;:)!?]|$)/g, "$1<em>$2</em>");
  const flushPara = () => { if (para.length) { html += "<p>" + para.map(inline).join("<br />") + "</p>"; para = []; } };
  const closeLists = () => {
    if (inUl) { html += "</ul>"; inUl = false; }
    if (inOl) { html += "</ol>"; inOl = false; }
  };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (!line.trim()) { flushPara(); closeLists(); continue; }
    const h = line.match(/^(#{1,4})\s+(.*)/);
    if (h) { flushPara(); closeLists(); const lvl = Math.min(6, h[1].length + 2); html += "<h" + lvl + ">" + inline(h[2]) + "</h" + lvl + ">"; continue; }
    if (/^\s*([-_*]\s*){3,}$/.test(line)) { flushPara(); closeLists(); html += "<hr />"; continue; }
    const ul = line.match(/^\s*[-*•]\s+(.*)/);
    if (ul) { flushPara(); if (inOl) { html += "</ol>"; inOl = false; } if (!inUl) { html += "<ul>"; inUl = true; } html += "<li>" + inline(ul[1]) + "</li>"; continue; }
    const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
    if (ol) { flushPara(); if (inUl) { html += "</ul>"; inUl = false; } if (!inOl) { html += "<ol>"; inOl = true; } html += "<li>" + inline(ol[1]) + "</li>"; continue; }
    para.push(line);
  }
  flushPara(); closeLists();
  return html;
}

    '<div class="result-actions">' +
    (kind === "download" || kind === "ocr"
      ? '<button type="button" class="btn btn-primary btn-lg" id="download-btn">' + svgIcon("download") + "Download " + esc(r.outputName || tool.output.name) + "</button>"
      : "") +
    '<button type="button" class="btn btn-secondary btn-lg" id="again-btn">Process another file</button>' +
    "</div></div>";

  const dl = $("#download-btn", panel);
  if (dl) dl.addEventListener("click", () => {
    const blob = r.blob
      ? r.blob
      : r.aiText && tool.output.ext === "txt"
        ? new Blob([r.aiText], { type: "text/plain" })
        : makeOutputBlob(tool);
    triggerDownload(blob, r.outputName || tool.output.name);
    toast("Download ready");
  });
  const copy = $("#copy-link", panel);
  if (copy) copy.addEventListener("click", () => {
    const input = $("#share-link", panel);
    input.select();
    (navigator.clipboard ? navigator.clipboard.writeText(input.value) : Promise.reject())
      .catch(() => document.execCommand("copy"));
    toast("Link copied");
  });
  $("#again-btn", panel).addEventListener("click", () => {
    state.files.forEach((f) => { if (f.url) URL.revokeObjectURL(f.url); });
    renderTool(tool);
  });
}

/* ==========================================================================
   Init
   ========================================================================== */
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-goto]");
  if (btn) location.hash = "#/tools/" + btn.dataset.goto;
  if (e.target.closest(".theme-toggle")) toggleTheme();
});

applyTheme(currentTheme());
route();
</script>
</body>
</html>
