   Real in-browser PDF processing (pdf-lib, loaded from CDN on demand)
   ========================================================================== */
let pdfLibPromise = null;
function loadPdfLib() {
  if (window.PDFLib) return Promise.resolve(window.PDFLib);
  if (pdfLibPromise) return pdfLibPromise;
  pdfLibPromise = new Promise((resolve, reject) => {
    const fail = () => { pdfLibPromise = null; reject(new Error("Could not load the PDF engine — check your internet connection.")); };
    const bail = setTimeout(fail, 20000);
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js";
    s.onload = () => { clearTimeout(bail); resolve(window.PDFLib); };
    s.onerror = () => { clearTimeout(bail); fail(); };
    document.head.appendChild(s);
  });
  return pdfLibPromise;
}

/* Minimal ZIP builder (stored entries) */
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }
  return t;
})();
function crc32(u8) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function zipBlob(files) {
  const enc = new TextEncoder();
  const num = (v, b) => { const a = new Uint8Array(b); for (let i = 0; i < b; i++) a[i] = (v >>> (8 * i)) & 0xFF; return a; };
  const chunks = [], central = [];
  let offset = 0;
  for (const f of files) {
    const name = enc.encode(f.name), crc = crc32(f.data);
    central.push({ name, crc, size: f.data.length, offset });
    for (const c of [num(0x04034b50, 4), num(20, 2), num(0, 2), num(0, 2), num(0, 2), num(0, 2), num(crc, 4), num(f.data.length, 4), num(f.data.length, 4), num(name.length, 2), num(0, 2), name, f.data]) {
      chunks.push(c); offset += c.length;
    }
  }
  const cdStart = offset;
  for (const e of central) {
    for (const c of [num(0x02014b50, 4), num(20, 2), num(20, 2), num(0, 2), num(0, 2), num(0, 2), num(0, 2), num(e.crc, 4), num(e.size, 4), num(e.size, 4), num(e.name.length, 2), num(0, 2), num(0, 2), num(0, 2), num(0, 2), num(0, 4), num(e.offset, 4), e.name]) {
      chunks.push(c); offset += c.length;
    }
  }
  chunks.push(num(0x06054b50, 4), num(0, 2), num(0, 2), num(central.length, 2), num(central.length, 2), num(offset - cdStart, 4), num(cdStart, 4), num(0, 2));
  return new Blob(chunks, { type: "application/zip" });
}

/* Page range helpers ("1-3, 5, 8-10" → 0-based indices) */
function parseRanges(str, max) {
  const out = [];
  for (const part of String(str).split(",")) {
    const s = part.trim();
    if (!s) continue;
    const m = s.match(/^(\d+)\s*-\s*(\d+)$/);
    if (m) {
      let [a, b] = [+m[1], +m[2]];
      if (a > b) [a, b] = [b, a];
      for (let i = a; i <= b; i++) if (i >= 1 && i <= max && !out.includes(i - 1)) out.push(i - 1);
    } else if (/^\d+$/.test(s)) {
      const i = +s;
      if (i >= 1 && i <= max && !out.includes(i - 1)) out.push(i - 1);
    } else {
      throw new Error('Invalid page range: "' + s + '"');
    }
  }
  if (!out.length) throw new Error("No valid pages selected — the document has " + max + " pages.");
  return out;
}
function parseSegments(str, max) {
  const segs = [];
  for (const part of String(str).split(",")) {
    if (part.trim()) segs.push(parseRanges(part, max));
  }
  if (!segs.length) throw new Error("Enter at least one page range.");
  return segs;
}

const PT_SIZES = { a4: [595.28, 841.89], a5: [419.53, 595.28], letter: [612, 792], legal: [612, 1008] };

async function fileBytes(entry) { return new Uint8Array(await entry.file.arrayBuffer()); }

async function loadPdfDoc(P, entry) {
  try { return await P.PDFDocument.load(await fileBytes(entry), { ignoreEncryption: true }); }
  catch (e) { throw new Error(entry.name + ": could not read this PDF (" + String(e.message || e).slice(0, 80) + ")"); }
}

async function embedImage(P, doc, entry) {
  const bytes = await fileBytes(entry);
  if (entry.ext === ".png") return doc.embedPng(bytes);
  if (entry.ext === ".jpg" || entry.ext === ".jpeg") return doc.embedJpg(bytes);
  /* webp (or anything else) → re-encode to PNG via canvas */
  const dataUrl = await new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext("2d").drawImage(img, 0, 0);
      resolve(c.toDataURL("image/png"));
    };
    img.onerror = () => reject(new Error(entry.name + ": could not decode image."));
    img.src = entry.url;
  });
  const bin = atob(dataUrl.split(",")[1]);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return doc.embedPng(u8);
}

function sanitizeWinAnsi(text) {
  let out = "";
  for (const ch of String(text)) out += ch.charCodeAt(0) >= 0x20 && ch.charCodeAt(0) <= 0xFF ? ch : "?";
  return out;
}

function fitBox(iw, ih, bw, bh) {
  const s = Math.min(bw / iw, bh / ih);
  return { w: iw * s, h: ih * s };
}

async function imagePage(P, doc, entry, sizeOpt, orientation, marginPt) {
  const img = await embedImage(P, doc, entry);
  let pw, ph;
  if (sizeOpt === "auto") { pw = img.width * 72 / 96 + 2 * marginPt; ph = img.height * 72 / 96 + 2 * marginPt; }
  else {
    [pw, ph] = PT_SIZES[sizeOpt] || PT_SIZES.a4;
    if (orientation === "landscape") [pw, ph] = [ph, pw];
  }
  const page = doc.addPage([pw, ph]);
  const r = fitBox(img.width, img.height, pw - 2 * marginPt, ph - 2 * marginPt);
  page.drawImage(img, { x: (pw - r.w) / 2, y: (ph - r.h) / 2, width: r.w, height: r.h });
  return page;
}

function pdfBlobFrom(bytes) { return new Blob([bytes], { type: "application/pdf" }); }

/* Convert canvas dataURL images from pdf.js renders */
async function renderPdfPageJpeg(doc, pageNo, scale, quality) {
  const page = await doc.getPage(pageNo);
  const vp = page.getViewport({ scale });
  const canvas = document.createElement("canvas");
  canvas.width = Math.ceil(vp.width); canvas.height = Math.ceil(vp.height);
  await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
  const bin = atob(canvas.toDataURL("image/jpeg", quality).split(",")[1]);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

/* ----------------------------------------------------------------
   In-browser background removal (MODNet portrait matting via Transformers.js,
   both Apache-2.0). Model (~25 MB) downloads once and is cached by the browser.
   Optional server override: set REMOVE_BG_ENDPOINT to use an API instead.
---------------------------------------------------------------- */
let bgModelPromise = null;

function loadBgModel(prog) {
  if (bgModelPromise) return bgModelPromise;
  bgModelPromise = (async () => {
    if (prog) prog(12, "Loading AI model — first time downloads ~25 MB…");
    const T = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.1/+esm");
    T.env.allowLocalModels = false;
    const model = await T.AutoModel.from_pretrained("Xenova/modnet", { dtype: "fp32" });
    const processor = await T.AutoProcessor.from_pretrained("Xenova/modnet");
    return { T, model, processor };
  })();
  bgModelPromise.catch(() => { bgModelPromise = null; });
  return bgModelPromise;
}

async function removeBgCanvas(f, prog) {
  let lib;
  try { lib = await loadBgModel(prog); }
  catch { throw new Error("Could not load the AI model — check your internet connection and try again, or use Manual erase mode."); }
  const { T, model, processor } = lib;
  prog(45, "Analyzing image…");
  const image = await T.RawImage.fromURL(f.url);
  const { pixel_values } = await processor(image);
  const { output } = await model({ input: pixel_values });
  prog(75, "Applying transparency mask…");
  const mask = await T.RawImage.fromTensor(output[0].mul(255).to("uint8")).resize(image.width, image.height);
  const src = await loadImg(f.url);
  const canvas = makeCanvas(src.naturalWidth, src.naturalHeight);
  const ctx = canvas.getContext("2d");
  ctx.drawImage(src, 0, 0);
  const px = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const alpha = mask.data;
  for (let i = 0; i < alpha.length; i++) px.data[i * 4 + 3] = alpha[i];
  ctx.putImageData(px, 0, 0);
  return canvas;
}

async function removeBgAuto(f, prog) {
  const canvas = await removeBgCanvas(f, prog);
  prog(90, "Encoding transparent PNG");
  return toBlobAsync(canvas, "image/png");
}

/* Does the image contain any real transparency? (JPGs never do) */
async function imageHasAlpha(f, img) {
  if (f.ext === ".jpg" || f.ext === ".jpeg") return false;
  try {
    const c = makeCanvas(Math.min(64, img.naturalWidth), Math.min(64, img.naturalHeight));
    const ctx = c.getContext("2d");
    ctx.drawImage(img, 0, 0, c.width, c.height);
    const data = ctx.getImageData(0, 0, c.width, c.height).data;
    for (let i = 3; i < data.length; i += 4) if (data[i] < 250) return true;
    return false;
  } catch { return true; /* if unreadable, assume transparent and skip AI */ }
}

/* ---------------------------------------------------------------- image helpers */
function loadImg(src) {
  return new Promise((resolve, reject) => {
    const i = new Image();
    i.onload = () => resolve(i);
    i.onerror = () => reject(new Error("Could not decode the image."));
    i.src = src;
  });
}
function toBlobAsync(canvas, type, q) {
  return new Promise((resolve, reject) =>
    canvas.toBlob((b) => (b ? resolve(b) : reject(new Error("Could not encode the image."))), type, q));
}
const IMG_MIME = { jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png", webp: "image/webp" };
function pickFormat(fmtOpt, entry) {
  if (!fmtOpt || fmtOpt === "same" || fmtOpt === "auto") {
    const e = entry.ext.slice(1);
    if (fmtOpt === "auto") return e === "webp" ? "webp" : "jpg";
    return e === "jpeg" ? "jpg" : e;
  }
  return fmtOpt;
}
function baseName(name) { return name.replace(/\.[^.]+$/, ""); }
function editorFilter() {
  const o = state.opts;
  return "brightness(" + o.brightness + "%) contrast(" + o.contrast + "%) saturate(" + o.saturation + "%) grayscale(" + o.grayscale + "%)" + (Number(o.blur) ? " blur(" + o.blur + "px)" : "");
}
function makeCanvas(w, h) {
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(w));
  c.height = Math.max(1, Math.round(h));
  return c;
}
async function encodeCanvas(canvas, fmt, quality) {
  if (fmt === "jpg") {
    const c2 = makeCanvas(canvas.width, canvas.height);
    const ctx = c2.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, c2.width, c2.height);
    ctx.drawImage(canvas, 0, 0);
    return toBlobAsync(c2, "image/jpeg", quality);
  }
  return toBlobAsync(canvas, IMG_MIME[fmt] || "image/png", quality);
}

/* ---------------------------------------------------------------- ZIP reader (minimal, for parsing Office files) */
async function readZipEntries(arrayBuffer) {
  const u8 = new Uint8Array(arrayBuffer);
  const view = new DataView(arrayBuffer);
  const entries = [];
  let offset = 0;
  while (offset < u8.length - 4) {
    if (view.getUint32(offset, true) !== 0x04034b50) break;
    const method = view.getUint16(offset + 8, true);
    const compSize = view.getUint32(offset + 18, true);
    const uncompSize = view.getUint32(offset + 22, true);
    const nameLen = view.getUint16(offset + 26, true);
    const extraLen = view.getUint16(offset + 28, true);
    const name = new TextDecoder().decode(u8.slice(offset + 30, offset + 30 + nameLen));
    const dataStart = offset + 30 + nameLen + extraLen;
    const data = u8.slice(dataStart, dataStart + compSize);
    let content;
    if (method === 0) {
      content = new TextDecoder().decode(data);
    } else if (method === 8) {
      try {
        const ds = new DecompressionStream("deflate-raw");
        const writer = ds.writable.getWriter();
        const reader = ds.readable.getReader();
        const chunks = [];
        writer.write(data); writer.close();
        while (true) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); }
        const total = chunks.reduce((s, c) => s + c.length, 0);
        const result = new Uint8Array(total);
        let pos = 0;
        for (const c of chunks) { result.set(c, pos); pos += c.length; }
        content = new TextDecoder().decode(result);
      } catch { content = ""; }
    } else { content = ""; }
    entries.push({ name, content, data });
    offset = dataStart + compSize;
  }
  return entries;
}

async function extractOfficeText(entry) {
  const buf = await entry.file.arrayBuffer();
  const entries = await readZipEntries(buf);
  if (entry.ext === ".docx") {
    const docXml = entries.find(e => e.name === "word/document.xml");
    if (!docXml) return "(Could not extract text from this Word document)";
    return docXml.content.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').trim();
  }
  if (entry.ext === ".xlsx") {
    const sheets = entries.filter(e => e.name.startsWith("xl/worksheets/sheet") && e.name.endsWith(".xml"));
    let text = "";
    const sharedStrings = entries.find(e => e.name === "xl/sharedStrings.xml");
    const strings = sharedStrings ? (sharedStrings.content.match(/<t[^>]*>([^<]*)<\/t>/g) || []).map(s => s.replace(/<[^>]+>/g, "")) : [];
    sheets.forEach(sheet => {
      const rows = (sheet.content.match(/<row[^>]*>.*?<\/row>/gs) || []);
      rows.forEach(row => {
        const cells = (row.match(/<c[^>]*>.*?<\/c>/gs) || []);
        const vals = cells.map(cell => {
          const v = cell.match(/<v>([^<]*)<\/v>/);
          const t = cell.match(/t="s"/);
          if (v && t) return strings[parseInt(v[1])] || v[1];
          return v ? v[1] : "";
        });
        text += vals.join("\t") + "\n";
      });
      text += "\n";
    });
    return text.trim() || "(Could not extract data from this Excel file)";
  }
  if (entry.ext === ".pptx") {
    const slides = entries.filter(e => e.name.match(/ppt\/slides\/slide\d+\.xml$/)).sort((a, b) => {
      const na = parseInt(a.name.match(/slide(\d+)/)[1]);
      const nb = parseInt(b.name.match(/slide(\d+)/)[1]);
      return na - nb;
    });
    let text = "";
    slides.forEach((slide, i) => {
      const paras = (slide.content.match(/<a:t>([^<]*)<\/a:t>/g) || []).map(s => s.replace(/<[^>]+>/g, ""));
      text += "--- Slide " + (i + 1) + " ---\n" + paras.join(" ") + "\n\n";
    });
    return text.trim() || "(Could not extract text from this PowerPoint file)";
  }
  if (entry.ext === ".odt") {
    const content = entries.find(e => e.name === "content.xml");
    if (!content) return "(Could not extract text from this ODT file)";
    return content.content.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
  }
  return "(Unsupported file format)";
}

async function extractEpubText(entry, prog) {
  const buf = await entry.file.arrayBuffer();
  const entries = await readZipEntries(buf);
  const container = entries.find(e => e.name === "META-INF/container.xml");
  if (!container) return "(Could not read EPUB structure)";
  const opfMatch = container.content.match(/full-path="([^"]+)"/);
  if (!opfMatch) return "(Could not find OPF file in EPUB)";
  const opfPath = opfMatch[1];
  const opfDir = opfPath.replace(/\/[^/]+$/, "");
  const opf = entries.find(e => e.name === opfPath);
  if (!opf) return "(Could not read OPF file)";
  const spineItems = (opf.content.match(/idref="([^"]+)"/g) || []).map(s => s.match(/idref="([^"]+)"/)[1]);
  const manifest = {};
  (opf.content.match(/<item[^>]+\/?>/g) || []).forEach(item => {
    const id = item.match(/id="([^"]+)"/);
    const href = item.match(/href="([^"]+)"/);
    if (id && href) manifest[id[1]] = opfDir + "/" + href[1];
  });
  let text = "";
  for (let i = 0; i < spineItems.length; i++) {
    const href = manifest[spineItems[i]];
    if (!href) continue;
    const item = entries.find(e => e.name === href);
    if (!item) continue;
    prog(15 + Math.round(45 * i / spineItems.length), "Reading chapter " + (i + 1));
    text += item.content.replace(/<[^>]+>/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&nbsp;/g, " ").replace(/\s+/g, " ").trim() + "\n\n";
  }
  return text.trim();
}

function createDocx(text) {
  const enc = new TextEncoder();
  const paras = text.split(/\n+/).filter(p => p.trim());
  let bodyXml = "";
  paras.forEach(p => {
    const safe = p.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    bodyXml += '<w:p><w:r><w:t xml:space="preserve">' + safe + '</w:t></w:r></w:p>';
  });
  const contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>';
  const rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>';
  const docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>' + bodyXml + '</w:body></w:document>';
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypes) },
    { name: "_rels/.rels", data: enc.encode(rels) },
    { name: "word/document.xml", data: enc.encode(docXml) },
  ];
  return zipBlob(files);
}

async function createDocxFromImages(images) {
  const enc = new TextEncoder();
  
  // Build document.xml with embedded images
  let bodyXml = "";
  images.forEach((imgData, i) => {
    const imgId = "rId" + (i + 2); // rId1 is for styles
    // A4 page width in EMUs: 595.28pt * 9525 = 5670042 EMU
    // Page height: 841.89pt * 9525 = 8018992 EMU
    // Image width: ~5400000 EMU (with margins)
    // Image height: proportional (A4 aspect ratio ~1.414)
    const imgWidth = 5400000;
    const imgHeight = Math.round(imgWidth * 1.414);
    
    bodyXml += '<w:p><w:pPr><w:jc w:val="center"/></w:pPr>';
    bodyXml += '<w:r><w:rPr/><w:drawing>';
    bodyXml += '<wp:inline distT="0" distB="0" distL="0" distR="0" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">';
    bodyXml += '<wp:extent cx="' + imgWidth + '" cy="' + imgHeight + '"/>';
    bodyXml += '<wp:docPr id="' + (i + 1) + '" name="Page ' + (i + 1) + '"/>';
    bodyXml += '<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">';
    bodyXml += '<a:graphicFramePr><a:graphicFrameLocks noChangeAspect="1"/></a:graphicFramePr>';
    bodyXml += '<a:xfrm><a:off x="0" y="0"/><a:ext cx="' + imgWidth + '" cy="' + imgHeight + '"/></a:xfrm>';
    bodyXml += '<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">';
    bodyXml += '<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">';
    bodyXml += '<pic:nvPicPr><pic:cNvPr id="' + (i + 1) + '" name="image' + (i + 1) + '.jpeg"/><pic:cNvPicPr/></pic:nvPicPr>';
    bodyXml += '<pic:blipFill><a:blip r:embed="' + imgId + '" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>';
    bodyXml += '<a:stretch><a:fillRect/></a:stretch></pic:blipFill>';
    bodyXml += '<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + imgWidth + '" cy="' + imgHeight + '"/></a:xfrm></pic:spPr>';
    bodyXml += '</pic:pic></a:graphicData></a:graphic></wp:inline>';
    bodyXml += '</w:drawing></w:r></w:p>';
  });
  
  // Build relationships for images
  let relsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  relsXml += '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  relsXml += '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>';
  relsXml += '</Relationships>';
  
  let docRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  docRelsXml += '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  images.forEach((_, i) => {
    const imgId = "rId" + (i + 2);
    docRelsXml += '<Relationship Id="' + imgId + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/image' + (i + 1) + '.jpeg"/>';
  });
  docRelsXml += '</Relationships>';
  
  // Build content types
  let contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
  contentTypesXml += '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">';
  contentTypesXml += '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>';
  contentTypesXml += '<Default Extension="xml" ContentType="application/xml"/>';
  contentTypesXml += '<Default Extension="jpeg" ContentType="image/jpeg"/>';
  contentTypesXml += '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>';
  contentTypesXml += '</Types>';
  
  // Build document.xml
  const docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" ' +
    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
    '<w:body>' + bodyXml + '</w:body></w:document>';
  
  // Prepare files for ZIP
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypesXml) },
    { name: "_rels/.rels", data: enc.encode(relsXml) },
    { name: "word/document.xml", data: enc.encode(docXml) },
    { name: "word/_rels/document.xml.rels", data: enc.encode(docRelsXml) },
  ];
  
  // Add image files
  images.forEach((imgData, i) => {
    files.push({ name: "word/media/image" + (i + 1) + ".jpeg", data: imgData });
  });
  
  return zipBlob(files);
}

/* Convert canvas to JPEG Uint8Array */
async function canvasToJpegData(canvas, quality) {
  const dataUrl = canvas.toDataURL("image/jpeg", quality || 0.92);
  const base64 = dataUrl.split(",")[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

/*
 * Create DOCX with preserved layout - each PDF page becomes a full-page image in Word.
 * This gives the highest visual fidelity - the Word document looks identical to the PDF.
 * Page dimensions (portrait/landscape, custom sizes) are preserved exactly.
 */
async function createPreserveLayoutDocx(pages) {
  const enc = new TextEncoder();
  const PT_TO_TWIP = 20;
  const PT_TO_EMU = 12700;
  
  let bodyXml = "";
  let docRelsEntries = "";
  const mediaFiles = [];
  
  pages.forEach((page, i) => {
    const imgId = "rId" + (i + 2);
    const widthTwip = Math.round(page.widthPt * PT_TO_TWIP);
    const heightTwip = Math.round(page.heightPt * PT_TO_TWIP);
    const widthEmu = Math.round(page.widthPt * PT_TO_EMU);
    const heightEmu = Math.round(page.heightPt * PT_TO_EMU);
    
    // Section properties for this page (size + zero margins)
    const sectPr = '<w:sectPr>' +
      '<w:pgSz w:w="' + widthTwip + '" w:h="' + heightTwip + '"/>' +
      '<w:pgMar w:top="0" w:right="0" w:bottom="0" w:left="0" w:header="0" w:footer="0" w:gutter="0"/>' +
      '</w:sectPr>';
    
    // Paragraph with image filling the entire page
    bodyXml += '<w:p><w:pPr><w:spacing w:after="0" w:line="240" w:lineRule="auto"/><w:jc w:val="center"/></w:pPr>';
    bodyXml += '<w:r><w:drawing>';
    bodyXml += '<wp:inline distT="0" distB="0" distL="0" distR="0" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">';
    bodyXml += '<wp:extent cx="' + widthEmu + '" cy="' + heightEmu + '"/>';
    bodyXml += '<wp:docPr id="' + (i + 1) + '" name="Page ' + (i + 1) + '"/>';
    bodyXml += '<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">';
    bodyXml += '<a:graphicFramePr><a:graphicFrameLocks noChangeAspect="1"/></a:graphicFramePr>';
    bodyXml += '<a:xfrm><a:off x="0" y="0"/><a:ext cx="' + widthEmu + '" cy="' + heightEmu + '"/></a:xfrm>';
    bodyXml += '<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">';
    bodyXml += '<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">';
    bodyXml += '<pic:nvPicPr><pic:cNvPr id="' + (i + 1) + '" name="page' + (i + 1) + '.jpeg"/><pic:cNvPicPr/></pic:nvPicPr>';
    bodyXml += '<pic:blipFill><a:blip r:embed="' + imgId + '" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>';
    bodyXml += '<a:stretch><a:fillRect/></a:stretch></pic:blipFill>';
    bodyXml += '<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + widthEmu + '" cy="' + heightEmu + '"/></a:xfrm></pic:spPr>';
    bodyXml += '</pic:pic></a:graphicData></a:graphic></wp:inline>';
    bodyXml += '</w:drawing></w:r></w:p>';
    
    // Add section break (except for last page)
    if (i < pages.length - 1) {
      bodyXml += '<w:p><w:pPr>' + sectPr + '</w:pPr></w:p>';
    }
    
    docRelsEntries += '<Relationship Id="' + imgId + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/image' + (i + 1) + '.jpeg"/>';
    mediaFiles.push({ name: "word/media/image" + (i + 1) + ".jpeg", data: page.imageData });
  });
  
  // Final section properties (for last page)
  const lastPage = pages[pages.length - 1];
  const finalSectPr = '<w:sectPr>' +
    '<w:pgSz w:w="' + Math.round(lastPage.widthPt * PT_TO_TWIP) + '" w:h="' + Math.round(lastPage.heightPt * PT_TO_TWIP) + '"/>' +
    '<w:pgMar w:top="0" w:right="0" w:bottom="0" w:left="0" w:header="0" w:footer="0" w:gutter="0"/>' +
    '</w:sectPr>';
  bodyXml += '<w:p><w:pPr>' + finalSectPr + '</w:pPr></w:p>';
  
  const contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    '<Default Extension="jpeg" ContentType="image/jpeg"/>' +
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '</Types>';
  
  const relsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +

/*
 * Create DOCX with editable text - text items positioned approximately like the PDF.
 * Text is fully editable in Word, but layout may not be pixel-perfect.
 * Groups text by lines and preserves font sizes.
 */
async function createEditableDocx(pages) {
  const enc = new TextEncoder();
  const PT_TO_TWIP = 20;
  const PT_TO_HALF_PT = 2;
  
  let bodyXml = "";
  
  pages.forEach((page, pageIdx) => {
    const widthTwip = Math.round(page.widthPt * PT_TO_TWIP);
    const heightTwip = Math.round(page.heightPt * PT_TO_TWIP);
    
    // Sort items by Y descending (PDF coords are bottom-up), then X ascending
    const sorted = [...page.items].sort((a, b) => {
      const yDiff = b.y - a.y;
      if (Math.abs(yDiff) < 5) return a.x - b.x;
      return yDiff;
    });
    
    // Group items into lines (items within 5pt Y difference are same line)
    const lines = [];
    let currentLine = [];
    let lastY = null;
    
    for (const item of sorted) {
      if (lastY !== null && Math.abs(item.y - lastY) > 5) {
        if (currentLine.length) lines.push(currentLine);
        currentLine = [];
      }
      currentLine.push(item);
      lastY = item.y;
    }
    if (currentLine.length) lines.push(currentLine);
    
    // Build paragraphs for each line
    for (const line of lines) {
      const fontSize = Math.round((line[0].fontSize || 12) * PT_TO_HALF_PT);
      let paraXml = '<w:p><w:pPr>';
      
      // Set line spacing
      paraXml += '<w:spacing w:after="0" w:line="240" w:lineRule="auto"/>';
      
      // Approximate left indent based on first item's X position
      const leftIndent = Math.round(line[0].x * PT_TO_TWIP);
      if (leftIndent > 100) {
        paraXml += '<w:ind w:left="' + leftIndent + '"/>';
      }
      
      paraXml += '</w:pPr>';
      
      // Add runs for each text item in the line
      for (const item of line) {
        const safe = item.str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const itemFontSize = Math.round((item.fontSize || 12) * PT_TO_HALF_PT);
        paraXml += '<w:r><w:rPr><w:sz w:val="' + itemFontSize + '"/><w:szCs w:val="' + itemFontSize + '"/></w:rPr>';
        paraXml += '<w:t xml:space="preserve">' + safe + '</w:t></w:r>';
      }
      
      paraXml += '</w:p>';
      bodyXml += paraXml;
    }
    
    // Add page break between pages (except last)
    if (pageIdx < pages.length - 1) {
      bodyXml += '<w:p><w:r><w:br w:type="page"/></w:r></w:p>';
    }
  });
  
  // Section properties
  const firstPage = pages[0];
  const sectPr = '<w:sectPr>' +
    '<w:pgSz w:w="' + Math.round(firstPage.widthPt * PT_TO_TWIP) + '" w:h="' + Math.round(firstPage.heightPt * PT_TO_TWIP) + '"/>' +
    '<w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="720" w:header="0" w:footer="0" w:gutter="0"/>' +
    '</w:sectPr>';
  bodyXml += '<w:p><w:pPr>' + sectPr + '</w:pPr></w:p>';
  
  const contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '</Types>';
  
  const relsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
    '</Relationships>';
  
  const docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:body>' + bodyXml + '</w:body></w:document>';
  
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypesXml) },
    { name: "_rels/.rels", data: enc.encode(relsXml) },
    { name: "word/document.xml", data: enc.encode(docXml) },
  ];
  
  return zipBlob(files);
}

/*
 * Create DOCX with OCR - image + invisible searchable text overlay.
 * Each page has the rendered PDF image as background, with invisible text positioned
 * over the exact locations where OCR found words. This makes the text searchable
 * and copyable while preserving the visual layout.
 */
async function createOcrDocx(pages) {
  const enc = new TextEncoder();
  const PT_TO_TWIP = 20;
  const PT_TO_EMU = 12700;
  
  let bodyXml = "";
  let docRelsEntries = "";
  const mediaFiles = [];
  
  pages.forEach((page, i) => {
    const imgId = "rId" + (i * 2 + 2);
    const widthTwip = Math.round(page.widthPt * PT_TO_TWIP);
    const heightTwip = Math.round(page.heightPt * PT_TO_TWIP);
    const widthEmu = Math.round(page.widthPt * PT_TO_EMU);
    const heightEmu = Math.round(page.heightPt * PT_TO_EMU);
    
    // Section properties
    const sectPr = '<w:sectPr>' +
      '<w:pgSz w:w="' + widthTwip + '" w:h="' + heightTwip + '"/>' +
      '<w:pgMar w:top="0" w:right="0" w:bottom="0" w:left="0" w:header="0" w:footer="0" w:gutter="0"/>' +
      '</w:sectPr>';
    
    // Paragraph with image (background)
    bodyXml += '<w:p><w:pPr><w:spacing w:after="0" w:line="240" w:lineRule="auto"/><w:jc w:val="center"/></w:pPr>';
    bodyXml += '<w:r><w:drawing>';
    bodyXml += '<wp:inline distT="0" distB="0" distL="0" distR="0" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">';
    bodyXml += '<wp:extent cx="' + widthEmu + '" cy="' + heightEmu + '"/>';
    bodyXml += '<wp:docPr id="' + (i + 1) + '" name="Page ' + (i + 1) + '"/>';
    bodyXml += '<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">';
    bodyXml += '<a:graphicFramePr><a:graphicFrameLocks noChangeAspect="1"/></a:graphicFramePr>';
    bodyXml += '<a:xfrm><a:off x="0" y="0"/><a:ext cx="' + widthEmu + '" cy="' + heightEmu + '"/></a:xfrm>';
    bodyXml += '<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">';
    bodyXml += '<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">';
    bodyXml += '<pic:nvPicPr><pic:cNvPr id="' + (i + 1) + '" name="page' + (i + 1) + '.jpeg"/><pic:cNvPicPr/></pic:nvPicPr>';
    bodyXml += '<pic:blipFill><a:blip r:embed="' + imgId + '" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>';
    bodyXml += '<a:stretch><a:fillRect/></a:stretch></pic:blipFill>';
    bodyXml += '<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + widthEmu + '" cy="' + heightEmu + '"/></a:xfrm></pic:spPr>';
    bodyXml += '</pic:pic></a:graphicData></a:graphic></wp:inline>';
    bodyXml += '</w:drawing></w:r></w:p>';
    
    // Add invisible text overlay (searchable layer)
    // Note: Word doesn't support true invisible overlaid text like PDF does,
    // so we add the OCR text as hidden paragraphs after the image.
    // The text is marked as hidden with w:vanish so it's searchable but not visible.
    if (page.ocrWords && page.ocrWords.length > 0) {
      // Group words into lines for cleaner output
      const lines = [];
      let currentLine = [];
      let lastY = null;
      
      const sortedWords = [...page.ocrWords].sort((a, b) => {
        const yDiff = a.y - b.y;
        if (Math.abs(yDiff) < 5) return a.x - b.x;
        return yDiff;
      });
      
      for (const word of sortedWords) {
        if (lastY !== null && Math.abs(word.y - lastY) > 5) {
          if (currentLine.length) lines.push(currentLine.join(" "));
          currentLine = [];
        }
        currentLine.push(word.text);
        lastY = word.y;
      }
      if (currentLine.length) lines.push(currentLine.join(" "));
      
      // Add hidden text paragraphs
      for (const line of lines) {
        const safe = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        bodyXml += '<w:p><w:pPr><w:rPr><w:vanish/></w:rPr></w:pPr>';
        bodyXml += '<w:r><w:rPr><w:vanish/><w:sz w:val="2"/></w:rPr>';
        bodyXml += '<w:t xml:space="preserve">' + safe + '</w:t></w:r></w:p>';
      }
    }
    
    // Section break
    if (i < pages.length - 1) {
      bodyXml += '<w:p><w:pPr>' + sectPr + '</w:pPr></w:p>';
    }
    
    docRelsEntries += '<Relationship Id="' + imgId + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/image' + (i + 1) + '.jpeg"/>';
    mediaFiles.push({ name: "word/media/image" + (i + 1) + ".jpeg", data: page.imageData });
  });
  
  // Final section
  const lastPage = pages[pages.length - 1];
  const finalSectPr = '<w:sectPr>' +
    '<w:pgSz w:w="' + Math.round(lastPage.widthPt * PT_TO_TWIP) + '" w:h="' + Math.round(lastPage.heightPt * PT_TO_TWIP) + '"/>' +
    '<w:pgMar w:top="0" w:right="0" w:bottom="0" w:left="0" w:header="0" w:footer="0" w:gutter="0"/>' +
    '</w:sectPr>';
  bodyXml += '<w:p><w:pPr>' + finalSectPr + '</w:pPr></w:p>';
  
  const contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    '<Default Extension="jpeg" ContentType="image/jpeg"/>' +
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '</Types>';
  
  const relsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
    '</Relationships>';
  
  const docRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    docRelsEntries +
    '</Relationships>';
  
  const docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" ' +
    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
    '<w:body>' + bodyXml + '</w:body></w:document>';
  
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypesXml) },
    { name: "_rels/.rels", data: enc.encode(relsXml) },
    { name: "word/document.xml", data: enc.encode(docXml) },
    { name: "word/_rels/document.xml.rels", data: enc.encode(docRelsXml) },
    ...mediaFiles,
  ];
  
  return zipBlob(files);
}

function createXlsx(text) {
  const enc = new TextEncoder();
  const rows = text.split("\n").filter(r => r.trim());
  let sheetXml = '<sheetData>';
  let sharedStrings = [];
  let ssXml = "";
  rows.forEach((row, ri) => {
    const cells = row.split("\t");
    sheetXml += '<row r="' + (ri + 1) + '">';
    cells.forEach((cell, ci) => {
      const ref = String.fromCharCode(65 + ci) + (ri + 1);
      const safe = cell.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      if (/^-?\d+(\.\d+)?$/.test(cell.trim())) {
        sheetXml += '<c r="' + ref + '"><v>' + cell.trim() + '</v></c>';
      } else {
        const idx = sharedStrings.length;
        sharedStrings.push(safe);
        ssXml += '<si><t>' + safe + '</t></si>';
        sheetXml += '<c r="' + ref + '" t="s"><v>' + idx + '</v></c>';
      }
    });
    sheetXml += '</row>';
  });
  sheetXml += '</sheetData>';
  const contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>';
  const rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const workbook = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Sheet1" sheetId="1" r:id="rId1"/></sheets></workbook>';
  const wbRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>';
  const sheet = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' + sheetXml + '</worksheet>';
  const shared = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="' + sharedStrings.length + '" uniqueCount="' + sharedStrings.length + '">' + ssXml + '</sst>';
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypes) },
    { name: "_rels/.rels", data: enc.encode(rels) },
    { name: "xl/workbook.xml", data: enc.encode(workbook) },
    { name: "xl/_rels/workbook.xml.rels", data: enc.encode(wbRels) },
    { name: "xl/worksheets/sheet1.xml", data: enc.encode(sheet) },
    { name: "xl/sharedStrings.xml", data: enc.encode(shared) },
  ];
  return zipBlob(files);
}

async function createPptx(text, pageCount) {
  const enc = new TextEncoder();
  const slides = text.split(/\n---\s*(?:Page|Slide)\s*\d+\s*---\n?/i).filter(s => s.trim());
  let slidesXml = "", slidesRels = "", contentOverrides = "";
  const slideCount = Math.max(1, slides.length || pageCount || 1);
  const wbRelsEntries = [];
  for (let i = 0; i < slideCount; i++) {
    const slideText = (slides[i] || "Slide " + (i + 1)).trim().slice(0, 500);
    const safe = slideText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const lines = safe.split("\n").slice(0, 10);
    let textShapes = "";
    lines.forEach((line, li) => {
      textShapes += '<p:sp><p:nvSpPr><p:cNvPr id="' + (li + 2) + '" name="Text' + li + '"/><p:cNvSpPr/><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="' + (457200 + li * 360000) + '"/><a:ext cx="8229600" cy="360000"/></a:xfrm></p:spPr><p:txBody><a:bodyPr/><a:lstStyle/><a:p><a:r><a:t>' + line + '</a:t></a:r></a:p></p:txBody></p:sp>';
    });
    const slideXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/>' + textShapes + '</p:spTree></p:cSld></p:sld>';
    const slideNum = i + 1;
    wbRelsEntries.push({ name: "ppt/slides/slide" + slideNum + ".xml", data: enc.encode(slideXml) });
    slidesXml += '<p:sldId id="' + (256 + i) + '" r:id="rId' + (i + 2) + '"/>';
    contentOverrides += '<Override PartName="/ppt/slides/slide' + slideNum + '.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>';
  }
  const contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>' + contentOverrides + '</Types>';
  const rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>';
  const presentation = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:sldIdLst>' + slidesXml + '</p:sldIdLst></p:presentation>';
  let presRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  for (let i = 0; i < slideCount; i++) presRels += '<Relationship Id="rId' + (i + 2) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide' + (i + 1) + '.xml"/>';
  presRels += '</Relationships>';
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypes) },
    { name: "_rels/.rels", data: enc.encode(rels) },
    { name: "ppt/presentation.xml", data: enc.encode(presentation) },
    { name: "ppt/_rels/presentation.xml.rels", data: enc.encode(presRels) },
    ...wbRelsEntries,
  ];
  return zipBlob(files);
}

  const presentation = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:sldIdLst>' + slidesXml + '</p:sldIdLst></p:presentation>';
  let presRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  for (let i = 0; i < images.length; i++) presRels += '<Relationship Id="rId' + (i + 2) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide' + (i + 1) + '.xml"/>';
  presRels += '</Relationships>';
  const files = [
    { name: "[Content_Types].xml", data: enc.encode(contentTypes) },
    { name: "_rels/.rels", data: enc.encode(rels) },
    { name: "ppt/presentation.xml", data: enc.encode(presentation) },
    { name: "ppt/_rels/presentation.xml.rels", data: enc.encode(presRels) },
    ...mediaEntries,
  ];
  return zipBlob(files);
}

const REAL_HANDLERS = {
  "merge-pdf": async (prog) => {
    const P = await loadPdfLib();
    const out = await P.PDFDocument.create();
    const font = await out.embedFont(P.StandardFonts.Helvetica);
    const [A4W, A4H] = PT_SIZES.a4;
    for (let i = 0; i < state.files.length; i++) {
      const f = state.files[i];
      prog(8 + Math.round(80 * i / state.files.length), "Adding " + f.name);
      if (f.ext === ".pdf") {
        const src = await loadPdfDoc(P, f);
        (await out.copyPages(src, src.getPageIndices())).forEach((p) => out.addPage(p));
      } else if ([".jpg", ".jpeg", ".png", ".webp"].includes(f.ext)) {
        await imagePage(P, out, f, "a4", "portrait", 40);
      } else {
        const page = out.addPage([A4W, A4H]);
        page.drawText(f.name.slice(0, 60), { x: 60, y: A4H - 90, size: 13, font });
        page.drawText("Placeholder page - Word/Excel/PowerPoint conversion is not available in the browser.", { x: 60, y: A4H - 112, size: 9, font, color: P.rgb(0.45, 0.45, 0.45) });
      }
      if (state.opts.separator && i < state.files.length - 1) out.addPage([A4W, A4H]);
    }
    prog(92, "Saving merged PDF");
    return { blob: pdfBlobFrom(await out.save()) };
  },

  "split-pdf": async (prog) => {
    const P = await loadPdfLib();
    const src = await loadPdfDoc(P, state.files[0]);
    const total = src.getPageCount();
    const o = state.opts;
    let segments;
    if (o.mode === "every") {
      const n = Math.max(1, Number(o.n) || 1);
      segments = [];
      for (let i = 0; i < total; i += n) segments.push(Array.from({ length: Math.min(n, total - i) }, (_, k) => i + k));
    } else if (o.mode === "extract") {
      segments = [parseRanges(o.pages, total)];
    } else {
      segments = parseSegments(o.pages, total);
    }
    const files = [];
    for (let i = 0; i < segments.length; i++) {
      prog(10 + Math.round(80 * i / segments.length), "Writing part " + (i + 1) + " of " + segments.length);
      const doc = await P.PDFDocument.create();
      (await doc.copyPages(src, segments[i])).forEach((p) => doc.addPage(p));
      files.push({ name: "part-" + String(i + 1).padStart(2, "0") + ".pdf", data: new Uint8Array(await doc.save()) });
    }
    if (files.length === 1) return { blob: pdfBlobFrom(files[0].data), name: "split-document.pdf" };
    prog(94, "Packaging zip");
    return { blob: zipBlob(files) };
  },

  "rotate-pdf": async (prog) => {
    const P = await loadPdfLib();
    const doc = await loadPdfDoc(P, state.files[0]);
    const delta = { "90cw": 90, "90ccw": -90, "180": 180 }[state.opts.angle];
    const pages = doc.getPages();
    const idx = state.opts.applyTo === "selected" ? parseRanges(state.opts.pages, pages.length) : pages.map((_, i) => i);
    prog(40, "Rotating " + idx.length + " pages");
    idx.forEach((i) => {
      const cur = pages[i].getRotation().angle || 0;
      pages[i].setRotation(P.degrees(((cur + delta) % 360 + 360) % 360));
    });
    prog(85, "Saving");
    return { blob: pdfBlobFrom(await doc.save()) };
  },

  "delete-pdf-pages": async (prog) => {
    const P = await loadPdfLib();

    const idx = parseRanges(state.opts.pages, total);
    if (idx.length >= total) throw new Error("Cannot delete every page — the output would be empty.");
    prog(40, "Removing " + idx.length + " pages");
    idx.sort((a, b) => b - a).forEach((i) => doc.removePage(i));

  "watermark-pdf": async (prog) => {

    const pages = state.opts.allPages ? doc.getPages() : [doc.getPages()[0]];
    prog(30, "Stamping " + pages.length + " pages");

      const { width, height } = page.getSize();
      const size = Math.min(72, (width * 0.7) / font.widthOfTextAtSize(text, 1));
      const tw = font.widthOfTextAtSize(text, size);
      let x = (width - tw) / 2, y = height / 2;
      if (state.opts.position === "top") y = height - size - 40;
      if (state.opts.position === "bottom") y = 40;
      page.drawText(text, { x, y, size, font, opacity, color: P.rgb(0.35, 0.35, 0.35), rotate: P.degrees(rot) });

  "txt-to-pdf": async (prog) => {
    const raw = state.files[0] ? await state.files[0].file.text() : state.ex.pastedText;
    const P = await loadPdfLib();
    const doc = await P.PDFDocument.create();
    const font = await doc.embedFont(P.StandardFonts.Helvetica);
    const size = Number(state.opts.fontSize) || 12;
    const [pw, ph] = PT_SIZES[state.opts.size] || PT_SIZES.a4;
    const margin = { small: 40, medium: 57, large: 72 }[state.opts.margin] || 57;
    const maxW = pw - 2 * margin, lineH = size * 1.45;
    const lines = [];
    for (const para of raw.split(/\r?\n/)) {
      let line = "";
      for (const word of para.split(/\s+/)) {
        const t = line ? line + " " + word : word;
        if (font.widthOfTextAtSize(t, size) > maxW && line) { lines.push(line); line = word; }
        else line = t;
      }
      lines.push(line);
    }
    prog(40, "Laying out " + lines.length + " lines");
    const perPage = Math.floor((ph - 2 * margin) / lineH);
    for (let i = 0; i < lines.length; i += perPage) {
      const page = doc.addPage([pw, ph]);
      lines.slice(i, i + perPage).forEach((ln, k) => {
        if (ln) page.drawText(sanitizeWinAnsi(ln), { x: margin, y: ph - margin - (k + 1) * lineH, size, font });
      });
    }
    prog(88, "Saving");
    return { blob: pdfBlobFrom(await doc.save()) };
  },

  "crop-pdf": async (prog) => {
    const P = await loadPdfLib();
    const doc = await loadPdfDoc(P, state.files[0]);

    const pages = o.allPages ? doc.getPages() : [doc.getPages()[0]];
    prog(40, "Cropping " + pages.length + " page" + (pages.length > 1 ? "s" : ""));
    pages.forEach((p) => {
      const { width, height } = p.getSize();
      const w = Math.max(36, width - mm(o.left) - mm(o.right));
      const h = Math.max(36, height - mm(o.top) - mm(o.bottom));
      p.setCropBox(mm(o.left), mm(o.bottom), w, h);
    });
    prog(85, "Saving");
    return { blob: pdfBlobFrom(await doc.save()) };
  },

  "sign-pdf": async (prog) => {

      const font = await doc.embedFont(P.StandardFonts.HelveticaOblique);

      page.drawText(sig.text, {

  "pdf-form-filler": async (prog) => {
    const P = await loadPdfLib();
    const doc = await loadPdfDoc(P, state.files[0]);
    let form = null;
    try { form = doc.getForm(); } catch { /* noop */ }
    const fields = form ? form.getFields() : [];
    if (!fields.length) throw new Error("This PDF has no fillable form fields.");
    prog(45, "Writing values into " + fields.length + " fields");
    let written = 0;
    fields.forEach((f) => {
      const v = state.ex.formValues[f.getName()];
      if (v == null || v === "") return;
      try {
        if (f instanceof P.PDFTextField) { f.setText(String(v)); written++; }
        else if (f instanceof P.PDFCheckBox) { (v === true || v === "true") ? f.check() : f.uncheck(); written++; }
        else if (f instanceof P.PDFDropdown || f instanceof P.PDFRadioGroup) { f.select(String(v)); written++; }
      } catch { /* incompatible value — skip */ }
    });
    prog(85, "Saving");
    return { blob: pdfBlobFrom(await doc.save()), rows: [["Fields filled", written + " of " + fields.length]] };
  },

  "crop-image": async (prog) => {
    const f = state.files[0];
    const img = await loadImg(f.url);
    const c = state.ex.crop || { x: 0, y: 0, w: 1, h: 1 };
    const sx = c.x * img.naturalWidth, sy = c.y * img.naturalHeight;
    const sw = Math.max(1, c.w * img.naturalWidth), sh = Math.max(1, c.h * img.naturalHeight);
    prog(35, "Cropping " + Math.round(sw) + " × " + Math.round(sh) + " px");
    const canvas = makeCanvas(sw, sh);
    canvas.getContext("2d").drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    const fmt = pickFormat(state.opts.format, f);
    prog(75, "Encoding " + fmt.toUpperCase());
    const blob = await encodeCanvas(canvas, fmt, 0.92);
    return { blob, name: baseName(f.name) + "-cropped." + fmt, rows: [["Resolution", canvas.width + " × " + canvas.height + " px"]] };

  "resize-image": async (prog) => {
    const f = state.files[0];
    const img = await loadImg(f.url);
    const o = state.opts;
    let W, H;
    if (o.mode === "percent") {
      const p = Math.max(1, Number(o.percent) || 50) / 100;
      W = img.naturalWidth * p; H = img.naturalHeight * p;
    } else {
      W = Math.max(1, Number(o.width) || img.naturalWidth);
      H = o.lock ? W * img.naturalHeight / img.naturalWidth : Math.max(1, Number(o.height) || img.naturalHeight);
    }
    prog(35, "Resizing to " + Math.round(W) + " × " + Math.round(H) + " px");
    const canvas = makeCanvas(W, H);
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const fmt = pickFormat(o.format, f);
    prog(75, "Encoding " + fmt.toUpperCase());
    const blob = await encodeCanvas(canvas, fmt, (Number(o.quality) || 90) / 100);
    return { blob, name: baseName(f.name) + "-resized." + fmt, rows: [["Resolution", canvas.width + " × " + canvas.height + " px"]] };
  },

  "compress-image": async (prog) => {
    const f = state.files[0];
    const img = await loadImg(f.url);
    const fmt = pickFormat(state.opts.format, f);
    prog(40, "Re-encoding as " + fmt.toUpperCase());
    const canvas = makeCanvas(img.naturalWidth, img.naturalHeight);
    canvas.getContext("2d").drawImage(img, 0, 0);
    const blob = await encodeCanvas(canvas, fmt, (Number(state.opts.quality) || 75) / 100);
    const saved = Math.max(0, Math.round((1 - blob.size / f.size) * 100));
    return { blob, name: baseName(f.name) + "-compressed." + fmt, rows: [["Reduction", saved + "% smaller"]] };

    const canvas = makeCanvas(img.naturalWidth, img.naturalHeight);
    const ctx = canvas.getContext("2d");
    if (fmt === "jpg") {
      ctx.fillStyle = o.bg === "black" ? "#000000" : o.bg === "custom" ? (o.bgcolor || "#ffffff") : "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

  "remove-background": async (prog) => {
    const f = state.files[0];
    if (state.opts.mode === "auto") {
      if (REMOVE_BG_ENDPOINT) {
        prog(30, "Sending to background-removal service");
        const fd = new FormData();
        fd.append("image", f.file, f.name);
        let res;
        try { res = await fetch(REMOVE_BG_ENDPOINT, { method: "POST", body: fd }); }
        catch { throw new Error("Could not reach the background-removal service."); }
        if (!res.ok) throw new Error("Background removal failed (" + res.status + ").");
        prog(80, "Receiving result");
        return { blob: await res.blob(), name: baseName(f.name) + "-nobg.png" };
      }
      const blob = await removeBgAuto(f, prog);
      return { blob, name: baseName(f.name) + "-nobg.png", rows: [["Method", "AI (on-device, MODNet)"]] };
    }
    const work = state.ex.bgCanvas;
    if (!work) throw new Error("Upload an image first, then erase the background with the brush.");
    prog(60, "Encoding transparent PNG");

  "change-background": async (prog) => {
    const o = state.opts;
    const fg = state.files[0];
    if ((o.mode === "image" || o.mode === "blur") && state.files.length < 2) {
      throw new Error("Upload a second file to use as the background.");
    }
    const img = await loadImg(fg.url);
    let subject = img;
    let autoRemoved = false;
    if (!(await imageHasAlpha(fg, img))) {
      /* photo still has its old background — remove it with on-device AI first */
      subject = await removeBgCanvas(fg, prog);
      autoRemoved = true;
    }
    const canvas = makeCanvas(img.naturalWidth, img.naturalHeight);
    const ctx = canvas.getContext("2d");
    prog(82, "Compositing new background");
    if (o.mode === "color") {
      ctx.fillStyle = o.color || "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
      const bg = await loadImg(state.files[1].url);
      const s = Math.max(canvas.width / bg.naturalWidth, canvas.height / bg.naturalHeight);
      if (o.mode === "blur") ctx.filter = "blur(" + (Number(o.blurAmt) || 12) + "px)";
      ctx.drawImage(bg, (canvas.width - bg.naturalWidth * s) / 2, (canvas.height - bg.naturalHeight * s) / 2, bg.naturalWidth * s, bg.naturalHeight * s);
      ctx.filter = "none";
    }
    ctx.drawImage(subject, 0, 0);
    prog(92, "Encoding PNG");
    const blob = await toBlobAsync(canvas, "image/png");
    return {
      blob,
      name: baseName(fg.name) + "-newbg.png",
      rows: autoRemoved ? [["Subject", "Old background removed automatically (on-device AI)"]] : null,
    };
  },

  "image-editor": async (prog) => {
    const f = state.files[0];
    const img = await loadImg(f.url);
    const t = state.ex.imgT || { rot: 0, fh: false, fv: false };
    const swap = t.rot % 180 !== 0;
    const canvas = makeCanvas(swap ? img.naturalHeight : img.naturalWidth, swap ? img.naturalWidth : img.naturalHeight);
    const ctx = canvas.getContext("2d");
    prog(40, "Applying adjustments");
    ctx.filter = editorFilter();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate((t.rot * Math.PI) / 180);
    ctx.scale(t.fh ? -1 : 1, t.fv ? -1 : 1);
    ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
    const fmt = pickFormat("same", f);
    prog(80, "Encoding " + fmt.toUpperCase());
    const blob = await encodeCanvas(canvas, fmt, 0.92);
    return { blob, name: baseName(f.name) + "-edited." + fmt };
  },

  "image-to-pdf": async (prog) => {
    const P = await loadPdfLib();
    const doc = await P.PDFDocument.create();
    const o = state.opts;
    const mPt = Math.max(0, Number(o.margin) || 0) * MM2PT;
    const SIZES = { a4: [595.28, 841.89], letter: [612, 792], f4: [595.28, 935.43] };
    for (let i = 0; i < state.files.length; i++) {
      const f = state.files[i];
      prog(8 + Math.round(80 * i / state.files.length), "Placing " + f.name);
      const img = await loadImg(f.url);
      const iw = img.naturalWidth, ih = img.naturalHeight;
      let pw, ph;
      if (o.size === "original") { pw = iw * 72 / 96 + 2 * mPt; ph = ih * 72 / 96 + 2 * mPt; }
      else {
        [pw, ph] = SIZES[o.size] || SIZES.a4;
        const land = o.orientation === "landscape" || (o.orientation === "auto" && iw > ih);
        if (land) [pw, ph] = [ph, pw];
      }
      const bw = pw - 2 * mPt, bh = ph - 2 * mPt;
      const page = doc.addPage([pw, ph]);
      if (o.size !== "original" && o.fit === "fill") {
        /* crop source to the page box aspect via canvas, then fill the box */
        const boxAspect = bw / bh;
        const cw = Math.min(iw, ih * boxAspect), chh = cw / boxAspect;
        const canvas = makeCanvas(cw, chh);
        canvas.getContext("2d").drawImage(img, (iw - cw) / 2, (ih - chh) / 2, cw, chh, 0, 0, canvas.width, canvas.height);
        const bin = atob(canvas.toDataURL("image/jpeg", 0.92).split(",")[1]);
        const u8 = new Uint8Array(bin.length);
        for (let b = 0; b < bin.length; b++) u8[b] = bin.charCodeAt(b);
        const em = await doc.embedJpg(u8);
        page.drawImage(em, { x: mPt, y: mPt, width: bw, height: bh });
      } else {
        const em = await embedImage(P, doc, f);
        let dw, dh;
        if (o.size !== "original" && o.fit === "original") {
          const scale = Math.min(1, bw / (iw * 72 / 96), bh / (ih * 72 / 96));
          dw = iw * 72 / 96 * scale; dh = ih * 72 / 96 * scale;
        } else {
          const r = fitBox(iw, ih, bw, bh);
          dw = r.w; dh = r.h;
        }
        page.drawImage(em, { x: (pw - dw) / 2, y: (ph - dh) / 2, width: dw, height: dh });
      }
    }
    prog(94, "Saving PDF");
    return { blob: pdfBlobFrom(await doc.save()), rows: [["Pages", String(state.files.length)]] };
  },

  "batch-image": async (prog) => {
    const o = state.opts;
    const out = [];
    let failed = 0;
    for (let i = 0; i < state.files.length; i++) {
      const f = state.files[i];
      prog(5 + Math.round(85 * i / state.files.length), f.name + " (" + (i + 1) + "/" + state.files.length + ")");
      try {
        const img = await loadImg(f.url);
        let W = img.naturalWidth, H = img.naturalHeight;
        if (o.op === "resize") {
          const p = Math.max(1, Number(o.percent) || 50) / 100;
          W *= p; H *= p;
        }
        const fmt = o.op === "convert" ? o.target : pickFormat("auto", f);
        const canvas = makeCanvas(W, H);
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const blob = await encodeCanvas(canvas, fmt, (Number(o.quality) || 80) / 100);
        const prefix = (o.rename || "").trim();
        const name = (prefix ? prefix + "-" + String(i + 1).padStart(3, "0") : baseName(f.name) + "-" + o.op) + "." + fmt;
        out.push({ name, data: new Uint8Array(await blob.arrayBuffer()) });
      } catch { failed++; }
    }
    if (!out.length) throw new Error("No images could be processed.");
    prog(94, "Packaging ZIP");
    return {
      blob: zipBlob(out),
      rows: [["Processed", out.length + " of " + state.files.length + " files"], ["Failed", String(failed)]],
    };
  },

  "pdf-scanner": async (prog) => {
    const P = await loadPdfLib();
    const doc = await P.PDFDocument.create();
    const filter = state.opts.bw ? "grayscale(1) contrast(1.35)" : state.opts.contrast ? "contrast(1.2) saturate(1.05)" : "";
    for (let i = 0; i < state.files.length; i++) {
      const f = state.files[i];
      prog(8 + Math.round(82 * i / state.files.length), "Enhancing " + f.name);
      const dataUrl = await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          c.width = img.naturalWidth; c.height = img.naturalHeight;
          const ctx = c.getContext("2d");
          ctx.filter = filter;
          ctx.drawImage(img, 0, 0);
          resolve(c.toDataURL("image/jpeg", 0.88));
        };
        img.onerror = () => reject(new Error(f.name + ": could not decode image."));
        img.src = f.url;
      });
      const bin = atob(dataUrl.split(",")[1]);
      const u8 = new Uint8Array(bin.length);
      for (let b = 0; b < bin.length; b++) u8[b] = bin.charCodeAt(b);
      const img = await doc.embedJpg(u8);
      const [pw, ph] = PT_SIZES.a4;
      const page = doc.addPage([pw, ph]);
      const r = fitBox(img.width, img.height, pw - 40, ph - 40);
      page.drawImage(img, { x: (pw - r.w) / 2, y: (ph - r.h) / 2, width: r.w, height: r.h });
    }
    prog(94, "Saving");
    return { blob: pdfBlobFrom(await doc.save()) };
  },

  "pdf-converter": async (prog) => {
    const f = state.files[0];
    const target = state.opts.target;
    if (target === "pdf" || f.ext === ".pdf") {
      if (f.ext === ".pdf") return { blob: await f.file.arrayBuffer().then(b => pdfBlobFrom(new Uint8Array(b))) };
      const P = await loadPdfLib();
      const doc = await P.PDFDocument.create();
      const font = await doc.embedFont(P.StandardFonts.Helvetica);
      const [A4W, A4H] = PT_SIZES.a4;
      if ([".jpg", ".jpeg", ".png", ".webp"].includes(f.ext)) {
        await imagePage(P, doc, f, "a4", "portrait", 40);
      } else if (f.ext === ".txt") {
        const text = await f.file.text();
        const size = 12;
        const margin = 57;
        const maxW = A4W - 2 * margin, lineH = size * 1.45;
        const lines = [];
        for (const para of text.split(/\r?\n/)) {
          let line = "";
          for (const word of para.split(/\s+/)) {
            const t = line ? line + " " + word : word;
            if (font.widthOfTextAtSize(t, size) > maxW && line) { lines.push(line); line = word; }
            else line = t;
          }
          lines.push(line);
        }
        const perPage = Math.floor((A4H - 2 * margin) / lineH);
        for (let i = 0; i < lines.length; i += perPage) {
          const page = doc.addPage([A4W, A4H]);
          lines.slice(i, i + perPage).forEach((ln, k) => {
            if (ln) page.drawText(sanitizeWinAnsi(ln), { x: margin, y: A4H - margin - (k + 1) * lineH, size, font });
          });
        }
      } else {
        const page = doc.addPage([A4W, A4H]);
        page.drawText(f.name.slice(0, 60), { x: 60, y: A4H - 90, size: 13, font });
        const text = await extractOfficeText(f);
        const lines = text.split("\n").slice(0, 40);
        lines.forEach((ln, k) => {
          if (ln.trim()) page.drawText(sanitizeWinAnsi(ln).slice(0, 80), { x: 60, y: A4H - 130 - k * 16, size: 9, font, color: P.rgb(0.3, 0.3, 0.3) });
        });
      }
      return { blob: pdfBlobFrom(await doc.save()) };
    }
    if (target === "jpg") {
      const lib = await loadPdfJs();
      const doc = await lib.getDocument({ data: await f.file.arrayBuffer() }).promise;
      const files = [];
      for (let k = 1; k <= Math.min(doc.numPages, 20); k++) {
        prog(8 + Math.round(84 * k / doc.numPages), "Rendering page " + k);
        files.push({ name: "page-" + String(k).padStart(3, "0") + ".jpg", data: await renderPdfPageJpeg(doc, k, 2, 0.85) });
      }
      doc.destroy();
      if (files.length === 1) return { blob: new Blob([files[0].data], { type: "image/jpeg" }), name: files[0].name };
      return { blob: zipBlob(files) };
    }
    prog(30, "Extracting content from PDF");
    const lib = await loadPdfJs();
    const pdfDoc = await lib.getDocument({ data: await f.file.arrayBuffer() }).promise;
    let allText = "";
    const pageCount = Math.min(pdfDoc.numPages, 50);
    for (let p = 1; p <= pageCount; p++) {
      prog(30 + Math.round(40 * p / pageCount), "Reading page " + p);
      const page = await pdfDoc.getPage(p);
      const tc = await page.getTextContent();
      allText += "\n--- Page " + p + " ---\n" + tc.items.map(it => it.str).join(" ");
    }
    pdfDoc.destroy();
    prog(80, "Creating output file");
    if (target === "docx") {
      return { blob: await createDocx(allText.trim()), name: baseName(f.name) + ".docx" };
    }
    if (target === "xlsx") {
      return { blob: await createXlsx(allText.trim()), name: baseName(f.name) + ".xlsx" };
    }
    if (target === "pptx") {
      return { blob: await createPptx(allText.trim(), pageCount), name: baseName(f.name) + ".pptx" };
    }
    return { blob: new Blob([allText], { type: "text/plain" }), name: baseName(f.name) + ".txt" };
  },

  "pdf-to-word": async (prog) => {
    const f = state.files[0];
    const mode = state.opts.mode || "preserve";
    const qualityMap = { standard: 1.5625, high: 3, ultra: 4.167 };
    const scale = qualityMap[state.opts.quality] || 3;
    
    prog(5, "Loading PDF engine");
    const lib = await loadPdfJs();
    const pdfDoc = await lib.getDocument({ data: await f.file.arrayBuffer() }).promise;
    const numPages = pdfDoc.numPages;
    
    if (mode === "preserve") {
      // === PRESERVE LAYOUT MODE ===
      // Render each page as high-res image, embed in DOCX with exact page dimensions
      // This gives pixel-perfect visual match with the original PDF
      prog(10, "Rendering pages as images");
      const pages = [];
      
      for (let p = 1; p <= numPages; p++) {
        prog(10 + Math.round(70 * p / numPages), "Rendering page " + p + " of " + numPages);
        const page = await pdfDoc.getPage(p);
        const viewport = page.getViewport({ scale });
        
        // Create canvas and render page
        const canvas = document.createElement("canvas");
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        const ctx = canvas.getContext("2d");
        
        await page.render({ canvasContext: ctx, viewport }).promise;
        
        // Convert canvas to JPEG blob data
        const jpegData = await canvasToJpegData(canvas, 0.92);
        
        // Get page dimensions in points (1 point = 1/72 inch)
        const baseViewport = page.getViewport({ scale: 1 });
        pages.push({
          imageData: jpegData,
          widthPt: baseViewport.width,
          heightPt: baseViewport.height,
        });
      }
      
      pdfDoc.destroy();
      prog(85, "Building Word document with preserved layout");
      const blob = await createPreserveLayoutDocx(pages);
      return { blob, name: baseName(f.name) + ".docx", rows: [
        ["Mode", "Preserve Layout"],
        ["Pages", String(numPages)],
        ["Quality", (state.opts.quality || "high") + " (" + Math.round(scale * 96) + " DPI)"],
      ]};
      
    } else if (mode === "editable") {
      // === EDITABLE TEXT MODE ===
      // Extract text with positions, create DOCX with positioned text blocks
      // Layout is approximate but text is fully editable
      prog(10, "Extracting text with positions");
      const pages = [];
      
      for (let p = 1; p <= numPages; p++) {
        prog(10 + Math.round(60 * p / numPages), "Reading page " + p + " of " + numPages);
        const page = await pdfDoc.getPage(p);
        const tc = await page.getTextContent();
        const baseViewport = page.getViewport({ scale: 1 });
        
        // Group text items by Y position (same line)
        const items = tc.items.map(item => ({
          str: item.str,
          x: item.transform[4],
          y: item.transform[5],
          fontSize: Math.abs(item.transform[0]) || item.height || 12,
          width: item.width,
          height: item.height,
        })).filter(item => item.str.trim());
        
        pages.push({
          items,
          widthPt: baseViewport.width,
          heightPt: baseViewport.height,
        });
      }
      
      pdfDoc.destroy();
      prog(75, "Building editable Word document");
      const blob = await createEditableDocx(pages);
      return { blob, name: baseName(f.name) + ".docx", rows: [
        ["Mode", "Editable Text"],
        ["Pages", String(numPages)],
        ["Text items", String(pages.reduce((sum, p) => sum + p.items.length, 0))],
      ]};
      
    } else if (mode === "ocr") {
      // === OCR MODE ===
      // Render pages as images + OCR with Tesseract.js
      // Create DOCX with image + searchable invisible text overlay
      prog(10, "Loading OCR engine");
      let Tesseract;
      try {
        Tesseract = await import("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js");
      } catch (e) {
        throw new Error("Could not load OCR engine. Please check your internet connection.");
      }
      
      const worker = await Tesseract.createWorker("eng");
      const pages = [];
      
      for (let p = 1; p <= numPages; p++) {
        prog(10 + Math.round(75 * p / numPages), "OCR page " + p + " of " + numPages);
        const page = await pdfDoc.getPage(p);
        const viewport = page.getViewport({ scale });
        
        // Render page to canvas
        const canvas = document.createElement("canvas");
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);
        const ctx = canvas.getContext("2d");
        await page.render({ canvasContext: ctx, viewport }).promise;
        
        // OCR with word-level data
        const { data } = await worker.recognize(canvas);
        
        // Convert canvas to JPEG
        const jpegData = await canvasToJpegData(canvas, 0.92);
        
        const baseViewport = page.getViewport({ scale: 1 });
        pages.push({
          imageData: jpegData,
          widthPt: baseViewport.width,
          heightPt: baseViewport.height,
          ocrWords: (data.words || []).map(w => ({
            text: w.text,
            x: w.bbox.x0 / scale,
            y: (viewport.height - w.bbox.y1) / scale,
            width: (w.bbox.x1 - w.bbox.x0) / scale,
            height: (w.bbox.y1 - w.bbox.y0) / scale,
          })),
        });
      }
      
      await worker.terminate();
      pdfDoc.destroy();
      
      prog(90, "Building searchable Word document");
      const blob = await createOcrDocx(pages);
      return { blob, name: baseName(f.name) + ".docx", rows: [
        ["Mode", "OCR (searchable)"],
        ["Pages", String(numPages)],
        ["Words recognized", String(pages.reduce((sum, p) => sum + p.ocrWords.length, 0))],
      ]};
    }
    
    throw new Error("Unknown conversion mode: " + mode);
  },

async function runRealProcess() {
  const tool = state.tool;
  state.phase = "processing";
  renderRightPanel(); renderFilesArea();
  toast("Processing started");
  const started = performance.now();
  try {
    const out = await REAL_HANDLERS[tool.id]((pct, label) => setProgress(pct, label));
    const inputSize = state.files.reduce((s, f) => s + f.size, 0) || (state.ex.pastedText || "").length;
    state.result = {
      inputName: state.files.length
        ? state.files[0].name + (state.files.length > 1 ? " (+" + (state.files.length - 1) + " more)" : "")
        : "Pasted text",
      inputSize,
      outputSize: out.blob.size,
      time: ((performance.now() - started) / 1000).toFixed(1) + "s",
      link: "",
      blob: out.blob,
      outputName: out.name || tool.output.name,
      rows: out.rows || null,
      previewUrl: out.blob.type.indexOf("image/") === 0 ? URL.createObjectURL(out.blob) : null,
      real: true,
    };
    state.phase = "done";
    renderRightPanel(); renderFilesArea();
    toast("Processing complete");
  } catch (e) {
    state.phase = "idle";
    renderRightPanel(); renderFilesArea();
    toast(e.message || "Processing failed", "error");
  }
}

async function extractPdfText(entry, maxChars) {
  const lib = await loadPdfJs();
  const buf = await entry.file.arrayBuffer();
  const doc = await lib.getDocument({ data: buf }).promise;
  let text = "";
  const pageCount = Math.min(doc.numPages, 50);
  for (let p = 1; p <= pageCount && text.length < maxChars; p++) {
    const page = await doc.getPage(p);
    const tc = await page.getTextContent();
    text += "\n--- Page " + p + " ---\n" + tc.items.map((it) => it.str).join(" ");
  }
  doc.destroy();
  if (!text.trim()) throw new Error("No selectable text found in this PDF (it may be a scanned document).");
  return text.slice(0, maxChars);
}

function aiPrompt(tool, docText) {
  const o = state.opts;
  const sys = "You are a document assistant. Work only from the document provided. Answer in the same language as the user's request when there is one; otherwise use the document's language.";
  let task;

               medium: "Write a clear one-paragraph-per-section summary.",
               detailed: "Write a detailed, structured summary with headings and bullet points." }[o.length] + " Summarize this document.";
      break;
    case "translate-pdf": {
      const lang = { en: "English", id: "Indonesian", es: "Spanish", fr: "French", de: "German", ja: "Japanese", zh: "Chinese" }[o.lang];
      task = "Translate the document content to " + lang + ". Preserve the structure (headings, lists, paragraphs). Output only the translation.";
      break;
    }
    case "ai-question-generator": {
      const kind = { mcq: "multiple choice questions with 4 options (mark the correct answer)", tf: "true/false questions (mark the correct answer)", open: "open-ended questions" }[o.qtype];
      task = "Generate exactly " + (Number(o.count) || 10) + " " + kind + " based on the document. Number them.";

    default:
